  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--bg); }

  body { font-family: "Open Sans", system-ui, sans-serif; color: var(--ink); -webkit-font-smoothing: antialiased; overscroll-behavior: none; }
  #root { height: 100%; }
  /* Full-viewport app shell — replaces the device bezel for real on-device use */
  .phone-viewport {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    background: var(--bg);
    /* honor the notch / home indicator */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .phone-viewport > .k-app { flex: 1; min-height: 0; }
  /* the in-app AppBar already reserves status-bar space; trim it on real devices
     since the OS status bar sits in the safe-area inset instead */
  .phone-viewport .ds-appbar { padding-top: 0 !important; }
  .phone-viewport > .k-app { margin-top: -6px; }
</style>
