<style>

    --ink: #122121;

    --line: #DDE5E2;

    --bg-warm: #EFF1EC;

    --green-2: #1E6A4A;
    --green-3: #61BC8F;
    --green-4: #9DDFB5;
    --primary: #395F61;  /* primary button — teal-green */

    --success: #61BC8F;
    --success-text: #0C4D33;

    --rust: #B0431B;
    --amber: #B97E0A;
    --amber-soft: #F8EFD6;
    --red: #9B2222;
    --blue: #4E7476;

  html, body { background: #0F1112; font-family: "Inter", system-ui, sans-serif; color: var(--ink); }
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 32px 0; }
  .font-display { font-family: "Inter", sans-serif; letter-spacing: -0.005em; }
  .num { font-feature-settings: "tnum" 1, "lnum" 1; font-variant-numeric: tabular-nums; }

  /* Phone frame */
  .phone-frame {
    width: 390px;
    height: 844px;
    background: #0a0c0a;
    border-radius: 50px;
    padding: 12px;
    box-shadow:
      0 0 0 1px #1f2422,
      0 30px 80px rgba(0,0,0,0.5),
      0 8px 30px rgba(0,0,0,0.3);
    position: relative;
  }
  .phone-screen {
    width: 100%;
    height: 100%;
    background: var(--bg);
    border-radius: 38px;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  /* Dynamic island */
  .phone-island {
    position: absolute;
    top: 11px;
    left: 50%;
    transform: translateX(-50%);
    width: 122px;
    height: 36px;
    background: #000;
    border-radius: 20px;
    z-index: 100;
  }

  /* Scroll area */
  .phone-content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding-top: 56px; /* below status bar / island */
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .phone-content::-webkit-scrollbar { display: none; }

  /* Tab bar at bottom */
  .phone-tabbar {
    height: 78px;
    background: rgba(255,255,255,0.94);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--line);
    display: flex;
    align-items: flex-start;
    justify-content: space-around;
    padding-top: 8px;
    padding-bottom: 22px; /* safe area */
  }

  .card { background: white; border: 1px solid var(--line); border-radius: 14px; }
  .eyebrow { font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-4); }

  /* Animations */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.25s ease-out; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .slide-up { animation: slideUp 0.3s ease-out; }

  /* Selection highlight */
  .row-tap:active { background: var(--bg-warm); }

  /* Persona switcher (above the phone) */
  .persona-switcher {
    position: absolute;
    top: -56px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
    background: rgba(255,255,255,0.08);
    padding: 4px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .persona-pill {
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 500;
    color: rgba(255,255,255,0.6);
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .persona-pill.active {
    background: white;
    color: var(--ink);
  }

  /* Info note below the phone */
  .frame-meta {
    position: absolute;
    bottom: -42px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 11px;
    white-space: nowrap;
  }

  /* Status bar mimicking iOS */
  .ios-status {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px 0;
    font-family: -apple-system, "SF Pro Text", sans-serif;
    font-weight: 600;
    font-size: 14px;
    color: var(--ink);
    z-index: 50;
  }

  button { font-family: inherit; }

  /* Pill */
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 2px 9px;
    border-radius: 99px;
    font-size: 10.5px;
    font-weight: 500;
    letter-spacing: 0.01em;
  }
</style>

const Pill = ({ children, tone = "neutral", dot }) => {
  const tones = {
    neutral: { bg: "var(--bg-warm)", color: "var(--ink-3)", dot: "var(--ink-3)" },
    green: { bg: "var(--green-soft)", color: "var(--success-text)", dot: "var(--success)" },
    amber: { bg: "var(--amber-soft)", color: "#7A5300", dot: "var(--amber)" },
    rust: { bg: "rgba(176,67,27,0.10)", color: "var(--rust)", dot: "var(--rust)" },
    ink: { bg: "var(--ink)", color: "white", dot: "var(--green-3)" },
  };
  const t = tones[tone] || tones.neutral;
  return (
    <span className="pill" style={{ background: t.bg, color: t.color }}>
      {dot && <span style={{ width: 6, height: 6, borderRadius: 3, background: t.dot }} />}
      {children}
    </span>
  );
};

/* ================================================================
   APP STATE — shared between all views
   ================================================================ */

const AppStateContext = React.createContext(null);
const useAppState = () => React.useContext(AppStateContext);

let nextId = 1000;
const genId = (prefix) => `${prefix}-${++nextId}-${Date.now().toString(36).slice(-4)}`;

const AppStateProvider = ({ children }) => {
  const [me, setMe] = useState(INITIAL_ME);
  const [timeEntries, setTimeEntries] = useState(INITIAL_TIME_ENTRIES);
  const [absences, setAbsences] = useState(INITIAL_ABSENCES);
  const [expenses, setExpenses] = useState(INITIAL_EXPENSES);
  const [team] = useState(INITIAL_TEAM);
  const [approvals, setApprovals] = useState(INITIAL_APPROVALS);
  // Items in the approval queue that came from Erik (the employee himself).
  // These appear in the manager view AND track back so the employee sees status updates.
  const [myPendingItems, setMyPendingItems] = useState([]); // [{ id, refType: "absence"|"expense", refId, approvalId }]

  // ============================================================
  // BroadcastChannel — sync to Kontek Next when data is created
  // Channel "kontek-sync" is shared between Sphere and Next tabs
  // ============================================================
  const broadcastRef = React.useRef(null);
  useEffect(() => {
    if (typeof BroadcastChannel === "undefined") return;
    broadcastRef.current = new BroadcastChannel("kontek-sync");
    return () => {
      if (broadcastRef.current) broadcastRef.current.close();
    };
  }, []);
  const broadcast = (payload) => {
    if (broadcastRef.current) {
      try { broadcastRef.current.postMessage(payload); } catch (e) { /* ignore */ }
    }
  };

  // Stamp in/out
  const clockIn = () => {
    const now = new Date();
    const time = now.toTimeString().slice(0, 5);
    setMe(m => ({ ...m, clockedIn: { startedAt: time, hours: 0 } }));
  };
  const clockOut = () => {
    setMe(m => ({ ...m, clockedIn: null }));
    // Lock today's entry as done
    setTimeEntries(entries => entries.map(e =>
      e.isToday ? { ...e, isToday: false, out: new Date().toTimeString().slice(0, 5), status: "klar", note: "Rapporterad" } : e
    ));
  };

  // Add a manual time entry
  const addTimeEntry = ({ date, hours, inTime, outTime, note }) => {
    const d = new Date(date);
    const dayLabels = ["Sön", "Mån", "Tis", "Ons", "Tor", "Fre", "Lör"];
    const newEntry = {
      id: genId("t"),
      date, day: dayLabels[d.getDay()],
      hours: parseFloat(hours) || 0,
      in: inTime || "—", out: outTime || "—",
      status: "klar", isToday: false,
      note: note || "Manuellt tillagd",
    };
    setTimeEntries(entries => [newEntry, ...entries]);
  };

  // Submit an absence application — becomes an approval in manager queue
  const submitAbsence = ({ type, typeLabel, icon, start, end, days, note }) => {
    const absenceId = genId("a");
    const approvalId = genId("p");
    setAbsences(list => [{
      id: absenceId, type, typeLabel, icon, start, end, days,
      status: "vantar", approver: "Anders Hellström", note,
    }, ...list]);
    // Also push into the manager's approval queue (Erik attesterar sina egna)
    setApprovals(list => [{
      id: approvalId, type: "absence", icon,
      employeeId: 1001, employeeName: "Erik Bergström", initials: "EB",
      title: `${typeLabel}`,
      summary: `${start} – ${end} · ${days} ${days === 1 ? "dag" : "dagar"}${note ? " · " + note : ""}`,
      submitted: "nyss",
      priority: "normal",
      isOwn: true, // marker so manager view can label this clearly
    }, ...list]);
    setMyPendingItems(items => [...items, { refType: "absence", refId: absenceId, approvalId }]);
    // Broadcast to Kontek Next so it can show this absence in the calendar
    broadcast({
      kind: "absence.created",
      origin: "sphere",
      payload: {
        id: absenceId,
        employeeId: 1, // Erik Bergström in Kontek Next's employee list
        employeeName: "Erik Bergström",
        type, typeLabel, icon, start, end, days, note,
        status: "vantar",
      },
    });
    return { absenceId, approvalId };
  };

  // Submit an expense — becomes an approval in manager queue
  const submitExpense = ({ amount, category, icon, merchant, purpose, date }) => {
    const today = date || new Date().toISOString().slice(0, 10);
    const expenseId = genId("e");
    const approvalId = genId("p");
    const amt = parseFloat(amount) || 0;
    const vatRate = VAT_RATES[category] || 0.25;
    const vat = Math.round(amt - (amt / (1 + vatRate)));
    const account = ACCOUNT_CODES[category] || "5410 Förbrukningsmaterial";
    setExpenses(list => [{
      id: expenseId, date: today, amount: amt,
      vat, account,
      category, icon, merchant: merchant || "Utan namn", purpose: purpose || "",
      status: "vantar", hasReceipt: true, type: "expense",
    }, ...list]);
    setApprovals(list => [{
      id: approvalId, type: "expense", icon: "wallet",
      employeeId: 1001, employeeName: "Erik Bergström", initials: "EB",
      title: "Utlägg",
      summary: `${merchant || "Utan namn"} · ${amt.toLocaleString("sv-SE")} kr`,
      submitted: "nyss",
      priority: "normal",
      isOwn: true,
    }, ...list]);
    setMyPendingItems(items => [...items, { refType: "expense", refId: expenseId, approvalId }]);
    return { expenseId, approvalId };
  };

  // Submit a travel claim — composite expense (multiple items + perdiem + mileage)
  const submitTravelClaim = ({ tripName, destination, startDate, endDate, items, perdiemDays, perdiemHalf, perdiemNights, mileageKm, purpose }) => {
    const today = new Date().toISOString().slice(0, 10);
    const expenseId = genId("e");
    const approvalId = genId("p");
    const itemsTotal = items.reduce((s, i) => s + (parseFloat(i.amount) || 0), 0);
    const perdiemTotal =
      (parseInt(perdiemDays) || 0) * TRAVEL_RATES.trakInrikesHel +
      (parseInt(perdiemHalf) || 0) * TRAVEL_RATES.trakInrikesHalv +
      (parseInt(perdiemNights) || 0) * TRAVEL_RATES.trakInrikesNatt;
    const mileageTotal = Math.round(((parseFloat(mileageKm) || 0) / 10) * TRAVEL_RATES.milMileage);
    const total = itemsTotal + perdiemTotal + mileageTotal;
    setExpenses(list => [{
      id: expenseId, date: today, amount: total,
      category: "Reseräkning", icon: "plane",
      merchant: tripName || "Reseräkning",
      purpose: `${destination || ""}${purpose ? " — " + purpose : ""}`,
      status: "vantar", hasReceipt: items.length > 0,
      type: "travel",
      tripDetails: {
        destination, startDate, endDate,
        items, perdiemDays, perdiemHalf, perdiemNights, mileageKm,
        perdiemTotal, mileageTotal, itemsTotal,
      },
      account: "5800 Tjänsteresor",
    }, ...list]);
    setApprovals(list => [{
      id: approvalId, type: "expense", icon: "plane",
      employeeId: 1001, employeeName: "Erik Bergström", initials: "EB",
      title: "Reseräkning",
      summary: `${tripName || destination || "Tjänsteresa"} · ${total.toLocaleString("sv-SE")} kr · ${items.length} utlägg${perdiemTotal > 0 ? " + traktamente" : ""}${mileageTotal > 0 ? " + mil" : ""}`,
      submitted: "nyss",
      priority: "normal",
      isOwn: true,
    }, ...list]);
    setMyPendingItems(items => [...items, { refType: "expense", refId: expenseId, approvalId }]);
    return { expenseId, approvalId };
  };

  // Manager approves — find linked absence/expense and update its status to "godkand"
  const approveItem = (approvalId) => {
    const approval = approvals.find(a => a.id === approvalId);
    if (!approval) return;
    setApprovals(list => list.filter(a => a.id !== approvalId));
    const link = myPendingItems.find(p => p.approvalId === approvalId);
    if (link) {
      if (link.refType === "absence") {
        setAbsences(list => list.map(a => a.id === link.refId ? { ...a, status: "godkand" } : a));
        // Vacation balance: deduct days if it's a semester
        const abs = absences.find(a => a.id === link.refId);
        if (abs && (abs.type === "semester")) {
          setMe(m => ({ ...m, vacationDays: Math.max(0, m.vacationDays - (abs.days || 0)) }));
        }
        if (abs && abs.type === "vab") {
          setMe(m => ({ ...m, vabDays: m.vabDays + (abs.days || 0) }));
        }
        if (abs && abs.type === "sjuk") {
          setMe(m => ({ ...m, sickDays: m.sickDays + (abs.days || 0) }));
        }
        // Broadcast the approval to Kontek Next
        if (abs) {
          broadcast({
            kind: "absence.approved",
            origin: "sphere",
            payload: { id: abs.id, employeeId: 1, employeeName: "Erik Bergström" },
          });
        }
      } else if (link.refType === "expense") {
        setExpenses(list => list.map(e => e.id === link.refId ? { ...e, status: "godkand" } : e));
      }
      setMyPendingItems(items => items.filter(p => p.approvalId !== approvalId));
    }
    return approval;
  };

  const declineItem = (approvalId) => {
    const approval = approvals.find(a => a.id === approvalId);
    if (!approval) return;
    setApprovals(list => list.filter(a => a.id !== approvalId));
    const link = myPendingItems.find(p => p.approvalId === approvalId);
    if (link) {
      if (link.refType === "absence") {
        setAbsences(list => list.map(a => a.id === link.refId ? { ...a, status: "avslagen" } : a));
      } else if (link.refType === "expense") {
        setExpenses(list => list.map(e => e.id === link.refId ? { ...e, status: "avslagen" } : e));
      }
      setMyPendingItems(items => items.filter(p => p.approvalId !== approvalId));
    }
    return approval;
  };

  // Manager requests info — sends item back to employee with a question, no decision yet
  const requestInfo = (approvalId, question) => {
    const approval = approvals.find(a => a.id === approvalId);
    if (!approval) return;
    setApprovals(list => list.filter(a => a.id !== approvalId));
    const link = myPendingItems.find(p => p.approvalId === approvalId);
    if (link) {
      if (link.refType === "expense") {
        setExpenses(list => list.map(e => e.id === link.refId
          ? { ...e, status: "komplettering", managerQuestion: question }
          : e));
      } else if (link.refType === "absence") {
        setAbsences(list => list.map(a => a.id === link.refId
          ? { ...a, status: "komplettering", managerQuestion: question }
          : a));
      }
      setMyPendingItems(items => items.filter(p => p.approvalId !== approvalId));
    }
    return approval;
  };

  // Helper to find the underlying object linked to an approval (for the detail view)
  const findLinkedRecord = (approvalId) => {
    const link = myPendingItems.find(p => p.approvalId === approvalId);
    if (!link) return null;
    if (link.refType === "expense") return { kind: "expense", record: expenses.find(e => e.id === link.refId) };
    if (link.refType === "absence") return { kind: "absence", record: absences.find(a => a.id === link.refId) };
    return null;
  };

  const resetAll = () => {
    setMe(INITIAL_ME);
    setTimeEntries(INITIAL_TIME_ENTRIES);
    setAbsences(INITIAL_ABSENCES);
    setExpenses(INITIAL_EXPENSES);
    setApprovals(INITIAL_APPROVALS);
    setMyPendingItems([]);
  };

  return (
    <AppStateContext.Provider value={{
      me, timeEntries, absences, expenses, team, approvals, myPendingItems,
      clockIn, clockOut, addTimeEntry, submitAbsence, submitExpense, submitTravelClaim,
      approveItem, declineItem, requestInfo, findLinkedRecord, resetAll,
    }}>
      {children}
    </AppStateContext.Provider>
  );
};

const AddTimeModal = ({ onClose }) => {
  const { addTimeEntry } = useAppState();
  const [date, setDate] = useState("2026-05-23");
  const [inTime, setInTime] = useState("08:00");
  const [outTime, setOutTime] = useState("16:30");
  const [note, setNote] = useState("");
  const [submitted, setSubmitted] = useState(false);

  // Compute hours from in/out
  const hoursFromTimes = useMemo(() => {
    if (!inTime || !outTime) return 0;
    const [ih, im] = inTime.split(":").map(Number);
    const [oh, om] = outTime.split(":").map(Number);
    const mins = (oh * 60 + om) - (ih * 60 + im) - 30; // minus 30 min lunch
    return Math.max(0, Math.round((mins / 60) * 10) / 10);
  }, [inTime, outTime]);

  if (submitted) {
    return (
      <div className="fade-in" style={{ position: "absolute", inset: 0, background: "white", zIndex: 60, display: "flex", flexDirection: "column" }}>
        <div className="flex-1 flex flex-col items-center justify-center px-6 text-center">
          <div style={{ width: 72, height: 72, borderRadius: 36, background: "var(--green-soft)", display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 18 }}>
            <Icon name="check2" size={36} strokeWidth={2.6} style={{ color: "var(--success-text)" }} />
          </div>
          <h2 className="font-display font-semibold mb-2" style={{ fontSize: 22, letterSpacing: "-0.015em" }}>Tid registrerad</h2>
          <p className="text-[13.5px] mb-4" style={{ color: "var(--ink-3)" }}>
            <span className="num font-semibold" style={{ color: "var(--ink)" }}>{hoursFromTimes} h</span> · <span className="num">{date}</span>
          </p>
        </div>
        <div className="p-4">
          <button onClick={onClose} className="w-full py-3 rounded-lg text-[13.5px] font-semibold"
            style={{ background: "var(--primary)", color: "white" }}>
            Stäng
          </button>
        </div>
      </div>
    );
  }

  return (
    <div className="fade-in" style={{ position: "absolute", inset: 0, background: "white", zIndex: 60, display: "flex", flexDirection: "column" }}>
      <div className="px-5 py-3.5 flex items-center justify-between" style={{ borderBottom: "1px solid var(--line)" }}>
        <button onClick={onClose} style={{ color: "var(--ink-2)" }}><Icon name="x" size={20} /></button>
        <div className="font-display font-semibold text-[15px]">Lägg till tid</div>
        <div style={{ width: 20 }} />
      </div>
      <div className="flex-1 overflow-y-auto p-4 space-y-4">
        <div>
          <div className="eyebrow mb-2">Datum</div>
          <input type="date" value={date} onChange={e => setDate(e.target.value)}
            className="w-full card px-3.5 py-3 text-[13px] outline-none num" />
        </div>
        <div>
          <div className="eyebrow mb-2">Tid</div>
          <div className="card overflow-hidden">
            <div className="px-4 py-3 flex items-center justify-between" style={{ borderBottom: "1px solid var(--line-2)" }}>
              <span className="text-[13px]" style={{ color: "var(--ink-2)" }}>Från</span>
              <input type="time" value={inTime} onChange={e => setInTime(e.target.value)}
                className="num text-[13px] font-medium text-right outline-none bg-transparent" />
            </div>
            <div className="px-4 py-3 flex items-center justify-between">
              <span className="text-[13px]" style={{ color: "var(--ink-2)" }}>Till</span>
              <input type="time" value={outTime} onChange={e => setOutTime(e.target.value)}
                className="num text-[13px] font-medium text-right outline-none bg-transparent" />
            </div>
          </div>
          <div className="mt-2 text-[11.5px] px-1 flex items-center gap-1.5" style={{ color: "var(--ink-3)" }}>
            <Icon name="info" size={11} />
            <span>Beräknad arbetstid <span className="num font-semibold" style={{ color: "var(--ink)" }}>{hoursFromTimes} h</span> (efter 30 min lunch)</span>
          </div>
        </div>
        <div>
          <div className="eyebrow mb-2">Kommentar <span className="opacity-50 normal-case font-normal">(valfritt)</span></div>
          <textarea value={note} onChange={e => setNote(e.target.value)}
            placeholder="T.ex. Sen ankomst pga bilkö"
            className="w-full card px-3.5 py-3 text-[13px] outline-none"
            style={{ minHeight: 70, resize: "none" }} />
        </div>
      </div>
      <div className="p-4" style={{ borderTop: "1px solid var(--line)" }}>
        <button onClick={() => {
          addTimeEntry({ date, hours: hoursFromTimes, inTime, outTime, note });
          setSubmitted(true);
        }}
          disabled={hoursFromTimes <= 0}
          className="w-full py-3 rounded-lg text-[13.5px] font-semibold"
          style={{ background: hoursFromTimes > 0 ? "var(--primary)" : "var(--line)", color: hoursFromTimes > 0 ? "white" : "var(--ink-4)" }}>
          Spara tid
        </button>
      </div>
    </div>
  );

const AbsenceModal = ({ onClose }) => {
  const { submitAbsence, me } = useAppState();
  const [type, setType] = useState("semester");
  const [start, setStart] = useState("2026-08-04");
  const [end, setEnd] = useState("2026-08-18");
  const [note, setNote] = useState("");
  const [submitted, setSubmitted] = useState(false);

  const types = [
    { id: "semester", label: "Semester", icon: "umbrella", color: "#0C4D33" },
    { id: "vab", label: "VAB", icon: "stethoscope", color: "#4E7476" },
    { id: "sjuk", label: "Sjuk", icon: "thermometer", color: "#9B2222" },
    { id: "foraldraledig", label: "Föräldraledig", icon: "stroller", color: "#7A4A8C" },
    { id: "tjanstledig", label: "Tjänstledig", icon: "briefcase-out", color: "#B97E0A" },
    { id: "komptid", label: "Komptid", icon: "hourglass", color: "#5A6B7E" },
  ];

  const selectedType = types.find(t => t.id === type);

  // Calculate days
  const days = useMemo(() => {
    if (!start || !end) return 0;
    const s = new Date(start), e = new Date(end);
    if (e < s) return 0;
    return Math.floor((e - s) / (1000 * 60 * 60 * 24)) + 1;
  }, [start, end]);

  const submit = () => {
    submitAbsence({
      type,
      typeLabel: selectedType.label,
      icon: selectedType.icon,
      start, end, days, note,
    });
    setSubmitted(true);
  };

  if (submitted) {
    return (
      <div className="fade-in" style={{ position: "absolute", inset: 0, background: "white", zIndex: 60, display: "flex", flexDirection: "column" }}>
        <div className="flex-1 flex flex-col items-center justify-center px-6 text-center">

          <p className="text-[12px]" style={{ color: "var(--ink-4)" }}>
            Den syns nu i din lista som "Väntar attest". Växla till chef-vyn för att se den i attestkön.
          </p>
        </div>
        <div className="p-4">
          <button onClick={onClose} className="w-full py-3 rounded-lg text-[13.5px] font-semibold"
            style={{ background: "var(--primary)", color: "white" }}>

      <div className="px-5 py-3.5 flex items-center justify-between" style={{ borderBottom: "1px solid var(--line)" }}>
        <button onClick={onClose} style={{ color: "var(--ink-2)" }}>
          <Icon name="x" size={20} />
        </button>
        <div className="font-display font-semibold text-[15px]">Ny ledighet</div>

      <div className="flex-1 overflow-y-auto p-4 space-y-4">

                  background: type === t.id ? t.color : "white",

                  border: type === t.id ? `1px solid ${t.color}` : "1px solid var(--line)",
                }}>
                <Icon name={t.icon} size={18} />

        <div>

  const [category, setCategory] = useState("Restaurang");
  const [amount, setAmount] = useState("");
  const [merchant, setMerchant] = useState("");
  const [purpose, setPurpose] = useState("");
  const [date, setDate] = useState(new Date().toISOString().slice(0, 10));
  const [submitted, setSubmitted] = useState(false);
  const [scanState, setScanState] = useState("idle"); // idle | scanning | done
  const [autofilledFields, setAutofilledFields] = useState({}); // visual highlight

  const categories = [
    { id: "Restaurang", label: "Restaurang", icon: "coffee" },
    { id: "Resa", label: "Resa", icon: "plane" },

    { id: "Hotell", label: "Hotell", icon: "home" },
    { id: "Övrigt", label: "Övrigt", icon: "receipt" },
  ];
  const selectedCategory = categories.find(c => c.id === category) || categories[0];

  // Auto-guess category as user types merchant
  useEffect(() => {
    if (!merchant || autofilledFields.category) return;
    const hint = MERCHANT_HINTS.find(h => h.match.test(merchant));
    if (hint && hint.category !== category) {
      setCategory(hint.category);
    }

  const goBack = () => setStep(s => Math.max(1, s - 1));

  return (
    <div className="fade-in" style={{ position: "absolute", inset: 0, background: "white", zIndex: 60, display: "flex", flexDirection: "column" }}>
      <div className="px-5 py-3.5 flex items-center justify-between" style={{ borderBottom: "1px solid var(--line)" }}>
        <button onClick={step === 1 ? onClose : goBack} style={{ color: "var(--ink-2)" }}>
          <Icon name={step === 1 ? "x" : "chevL"} size={20} />
        </button>
        <div className="font-display font-semibold text-[15px]">Ny reseräkning</div>
        <div style={{ width: 20 }} />
      </div>

      {/* Step progress */}
      <div className="px-4 py-2.5 flex items-center gap-1.5" style={{ background: "var(--bg-warm)" }}>
        {stepLabels.map((label, i) => (
          <div key={i} className="flex-1 flex items-center gap-1.5">
            <div style={{
              width: 18, height: 18, borderRadius: 9,
              background: step > i + 1 ? "var(--success)" : step === i + 1 ? "var(--ink)" : "var(--line)",
              color: "white", display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: 9, fontWeight: 700,
            }}>
              {step > i + 1 ? <Icon name="check2" size={10} strokeWidth={2.8} /> : i + 1}
            </div>
            <span className="text-[11px] font-medium truncate" style={{ color: step >= i + 1 ? "var(--ink)" : "var(--ink-4)" }}>{label}</span>
          </div>
        ))}
      </div>

      <div className="flex-1 overflow-y-auto p-4 space-y-4">
        {step === 1 && (
          <div className="space-y-4 fade-in">
            <div>
              <div className="eyebrow mb-2">Resa till</div>
              <input value={destination} onChange={e => setDestination(e.target.value)}
                placeholder="T.ex. Stockholm"
                className="w-full card px-3.5 py-3 text-[13px] outline-none" />
            </div>
            <div>
              <div className="eyebrow mb-2">Period</div>
              <div className="card overflow-hidden">
                <div className="px-4 py-3 flex items-center justify-between" style={{ borderBottom: "1px solid var(--line-2)" }}>
                  <span className="text-[13px]" style={{ color: "var(--ink-2)" }}>Avresa</span>
                  <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)}
                    className="num text-[13px] font-medium text-right outline-none bg-transparent" />
                </div>
                <div className="px-4 py-3 flex items-center justify-between">
                  <span className="text-[13px]" style={{ color: "var(--ink-2)" }}>Hemkomst</span>
                  <input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} min={startDate}
                    className="num text-[13px] font-medium text-right outline-none bg-transparent" />
                </div>
              </div>
            </div>
            <div>
              <div className="eyebrow mb-2">Syfte</div>
              <textarea value={purpose} onChange={e => setPurpose(e.target.value)}
                placeholder="T.ex. Kundmöte med ABB Robotics och leverantörsbesök"
                className="w-full card px-3.5 py-3 text-[13px] outline-none"
                style={{ minHeight: 70, resize: "none" }} />
            </div>
            <div>
              <div className="eyebrow mb-2">Namn på resan <span className="opacity-50 normal-case font-normal">(valfritt)</span></div>
              <input value={tripName} onChange={e => setTripName(e.target.value)}
                placeholder={destination ? `Tjänsteresa till ${destination}` : "T.ex. ABB-möte vecka 21"}
                className="w-full card px-3.5 py-3 text-[13px] outline-none" />
            </div>
          </div>
        )}

        {step === 2 && (
          <div className="space-y-4 fade-in">
            <div className="card px-3.5 py-3 flex items-start gap-2.5" style={{ background: "var(--bg-warm)", borderColor: "var(--line)" }}>
              <Icon name="info" size={14} style={{ color: "var(--ink-3)", marginTop: 1, flexShrink: 0 }} />
              <div className="text-[11.5px]" style={{ color: "var(--ink-2)" }}>
                Skattefria belopp enligt Skatteverket 2026 — heldag <span className="num">{TRAVEL_RATES.trakInrikesHel}</span> kr, halvdag <span className="num">{TRAVEL_RATES.trakInrikesHalv}</span> kr, natt <span className="num">{TRAVEL_RATES.trakInrikesNatt}</span> kr.
              </div>
            </div>

            <div>
              <div className="eyebrow mb-2">Traktamente</div>
              <div className="card overflow-hidden">
                <NumberRow label="Heldagar" sublabel={`${TRAVEL_RATES.trakInrikesHel} kr/dag`} value={perdiemDays} onChange={setPerdiemDays} />
                <NumberRow label="Halvdagar" sublabel={`${TRAVEL_RATES.trakInrikesHalv} kr/dag`} value={perdiemHalf} onChange={setPerdiemHalf} />
                <NumberRow label="Nattraktamente" sublabel={`${TRAVEL_RATES.trakInrikesNatt} kr/natt`} value={perdiemNights} onChange={setPerdiemNights} last />
              </div>
              {perdiemTotal > 0 && (
                <div className="mt-2 px-3 py-2 rounded-lg flex items-center justify-between text-[12px] fade-in"
                  style={{ background: "var(--green-soft)", border: "1px solid var(--success)" }}>
                  <span style={{ color: "var(--success-text)" }}>Traktamente totalt</span>
                  <span className="num font-semibold" style={{ color: "var(--success-text)" }}>{perdiemTotal.toLocaleString("sv-SE")} kr</span>
                </div>
              )}
            </div>

            <div>
              <div className="eyebrow mb-2">Milersättning</div>
              <div className="card overflow-hidden">
                <div className="px-4 py-3 flex items-center justify-between">
                  <div>
                    <div className="text-[13px]" style={{ color: "var(--ink-2)" }}>Egen bil</div>
                    <div className="text-[10.5px]" style={{ color: "var(--ink-4)" }}>{TRAVEL_RATES.milMileage} kr/mil skattefri</div>
                  </div>
                  <div className="flex items-center gap-2">
                    <input type="number" value={mileageKm} onChange={e => setMileageKm(e.target.value)} placeholder="0"
                      className="num text-[14px] font-semibold text-right outline-none bg-transparent"
                      style={{ width: 70 }} />
                    <span className="text-[12px]" style={{ color: "var(--ink-3)" }}>km</span>
                  </div>
                </div>
              </div>
              {mileageTotal > 0 && (
                <div className="mt-2 px-3 py-2 rounded-lg flex items-center justify-between text-[12px] fade-in"
                  style={{ background: "var(--green-soft)", border: "1px solid var(--success)" }}>
                  <span style={{ color: "var(--success-text)" }}>
                    {(parseFloat(mileageKm) / 10).toFixed(1).replace(".", ",")} mil × {TRAVEL_RATES.milMileage} kr
                  </span>
                  <span className="num font-semibold" style={{ color: "var(--success-text)" }}>{mileageTotal.toLocaleString("sv-SE")} kr</span>
                </div>
              )}
            </div>
          </div>
        )}

        {step === 3 && (
          <div className="space-y-4 fade-in">
            <div className="text-[12px]" style={{ color: "var(--ink-3)" }}>
              Lägg till alla utlägg du gjorde under resan (hotell, mat, taxi, etc.). Du kan skanna kvitton också.
            </div>

            {items.length > 0 && (
              <div className="card overflow-hidden">
                {items.map((it, i) => (
                  <div key={it.id} className="px-4 py-3 flex items-center gap-3"
                    style={{ borderBottom: i === items.length - 1 ? "none" : "1px solid var(--line-2)" }}>
                    <div style={{ width: 32, height: 32, borderRadius: 8, background: "var(--bg-warm)", color: "var(--ink-2)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                      <Icon name={it.icon} size={15} />
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="text-[12.5px] font-semibold truncate">{it.merchant}</div>
                      <div className="text-[10.5px]" style={{ color: "var(--ink-4)" }}>{it.category}</div>
                    </div>
                    <div className="text-right">
                      <div className="font-display num font-semibold text-[13px]">{(parseFloat(it.amount) || 0).toLocaleString("sv-SE")}<span className="text-[10.5px] font-normal opacity-60"> kr</span></div>
                    </div>
                    <button onClick={() => removeItem(it.id)} style={{ color: "var(--ink-4)" }}>
                      <Icon name="x" size={14} />
                    </button>
                  </div>
                ))}
              </div>
            )}

            {!showItemForm ? (
              <button onClick={() => setShowItemForm(true)}
                className="w-full card flex items-center justify-center gap-2 py-3 row-tap font-medium text-[13px]"
                style={{ borderStyle: "dashed", color: "var(--ink-2)" }}>
                <Icon name="plus" size={15} /> Lägg till utlägg
              </button>
            ) : (
              <div className="card p-3 space-y-2.5 fade-in">
                <div className="text-[12px] font-semibold mb-1">Nytt utlägg</div>
                <div className="grid grid-cols-4 gap-1.5">
                  {[
                    { id: "Restaurang", icon: "coffee" }, { id: "Hotell", icon: "home" },
                    { id: "Drivmedel", icon: "car" }, { id: "Övrigt", icon: "receipt" },
                  ].map(c => (
                    <button key={c.id} onClick={() => setNewItem({ ...newItem, category: c.id, icon: c.icon })}
                      className="py-2 rounded-md flex flex-col items-center gap-1 transition"
                      style={{
                        background: newItem.category === c.id ? "var(--ink)" : "var(--bg-warm)",
                        color: newItem.category === c.id ? "white" : "var(--ink-2)",
                      }}>
                      <Icon name={c.icon} size={13} />
                      <span style={{ fontSize: 10 }}>{c.id}</span>
                    </button>
                  ))}
                </div>
                <input value={newItem.merchant} onChange={e => setNewItem({ ...newItem, merchant: e.target.value })}
                  placeholder="Var (t.ex. Restaurang Operakällaren)"
                  className="w-full px-3 py-2 text-[12.5px] outline-none rounded-md"
                  style={{ background: "var(--bg-warm)", border: "1px solid var(--line-2)" }} />
                <div className="flex items-center gap-2 px-3 py-2 rounded-md"
                  style={{ background: "var(--bg-warm)", border: "1px solid var(--line-2)" }}>
                  <input type="number" value={newItem.amount} onChange={e => setNewItem({ ...newItem, amount: e.target.value })}
                    placeholder="0"
                    className="flex-1 num font-semibold text-[14px] outline-none bg-transparent" />
                  <span className="text-[11px]" style={{ color: "var(--ink-3)" }}>kr</span>
                </div>
                <div className="flex gap-2">
                  <button onClick={() => setShowItemForm(false)}
                    className="flex-1 py-2 rounded-md text-[12px] font-medium"
                    style={{ background: "white", color: "var(--ink-2)", border: "1px solid var(--line)" }}>
                    Avbryt
                  </button>
                  <button onClick={addItem}
                    disabled={!newItem.amount}
                    className="flex-1 py-2 rounded-md text-[12px] font-semibold"
                    style={{ background: newItem.amount ? "var(--primary)" : "var(--line)", color: newItem.amount ? "white" : "var(--ink-4)" }}>
                    Lägg till
                  </button>
                </div>
              </div>
            )}

            {itemsTotal > 0 && (
              <div className="px-3 py-2 rounded-lg flex items-center justify-between text-[12px] fade-in"
                style={{ background: "var(--bg-warm)" }}>
                <span style={{ color: "var(--ink-3)" }}>Utlägg totalt</span>
                <span className="num font-semibold">{itemsTotal.toLocaleString("sv-SE")} kr</span>
              </div>
            )}
          </div>
        )}

        {step === 4 && (
          <div className="space-y-3 fade-in">
            <div className="card overflow-hidden">
              <div className="px-4 py-3" style={{ background: "var(--ink)", color: "white" }}>
                <div className="text-[10.5px] uppercase tracking-wider opacity-60 font-semibold" style={{ letterSpacing: "0.06em" }}>Reseräkning</div>
                <div className="font-display font-semibold text-[16px] mt-0.5">{tripName || destination || "Tjänsteresa"}</div>
                <div className="text-[11.5px] opacity-70 mt-1 num">{startDate} → {endDate}</div>
              </div>

              <div className="px-4 py-3" style={{ borderBottom: "1px solid var(--line-2)" }}>
                <div className="eyebrow mb-2">Utlägg ({items.length})</div>
                {items.map(it => (
                  <div key={it.id} className="flex items-center justify-between py-1 text-[12px]">
                    <span style={{ color: "var(--ink-2)" }}>{it.merchant}</span>
                    <span className="num font-medium">{(parseFloat(it.amount) || 0).toLocaleString("sv-SE")} kr</span>
                  </div>
                ))}
                <div className="flex justify-between mt-1.5 pt-1.5 text-[12px] font-semibold" style={{ borderTop: "1px solid var(--line-2)" }}>
                  <span>Summa utlägg</span>
                  <span className="num">{itemsTotal.toLocaleString("sv-SE")} kr</span>
                </div>
              </div>

              {perdiemTotal > 0 && (
                <div className="px-4 py-3" style={{ borderBottom: "1px solid var(--line-2)" }}>
                  <div className="eyebrow mb-2">Traktamente</div>
                  {parseInt(perdiemDays) > 0 && (
                    <div className="flex justify-between py-1 text-[12px]">
                      <span style={{ color: "var(--ink-2)" }}><span className="num">{perdiemDays}</span> heldagar á <span className="num">{TRAVEL_RATES.trakInrikesHel}</span></span>
                      <span className="num font-medium">{(parseInt(perdiemDays) * TRAVEL_RATES.trakInrikesHel).toLocaleString("sv-SE")} kr</span>
                    </div>
                  )}
                  {parseInt(perdiemHalf) > 0 && (
                    <div className="flex justify-between py-1 text-[12px]">
                      <span style={{ color: "var(--ink-2)" }}><span className="num">{perdiemHalf}</span> halvdagar á <span className="num">{TRAVEL_RATES.trakInrikesHalv}</span></span>
                      <span className="num font-medium">{(parseInt(perdiemHalf) * TRAVEL_RATES.trakInrikesHalv).toLocaleString("sv-SE")} kr</span>
                    </div>
                  )}
                  {parseInt(perdiemNights) > 0 && (
                    <div className="flex justify-between py-1 text-[12px]">
                      <span style={{ color: "var(--ink-2)" }}><span className="num">{perdiemNights}</span> nätter á <span className="num">{TRAVEL_RATES.trakInrikesNatt}</span></span>
                      <span className="num font-medium">{(parseInt(perdiemNights) * TRAVEL_RATES.trakInrikesNatt).toLocaleString("sv-SE")} kr</span>
                    </div>
                  )}
                  <div className="flex justify-between mt-1.5 pt-1.5 text-[12px] font-semibold" style={{ borderTop: "1px solid var(--line-2)" }}>
                    <span>Summa traktamente</span>
                    <span className="num" style={{ color: "var(--success-text)" }}>{perdiemTotal.toLocaleString("sv-SE")} kr</span>
                  </div>
                  <div className="text-[10.5px] mt-1" style={{ color: "var(--ink-4)" }}>Skattefritt enligt Skatteverket 2026</div>
                </div>
              )}

              {mileageTotal > 0 && (
                <div className="px-4 py-3" style={{ borderBottom: "1px solid var(--line-2)" }}>
                  <div className="eyebrow mb-2">Milersättning</div>
                  <div className="flex justify-between text-[12px]">
                    <span style={{ color: "var(--ink-2)" }}><span className="num">{(parseFloat(mileageKm) / 10).toFixed(1).replace(".", ",")}</span> mil á <span className="num">{TRAVEL_RATES.milMileage}</span> kr</span>
                    <span className="num font-semibold" style={{ color: "var(--success-text)" }}>{mileageTotal.toLocaleString("sv-SE")} kr</span>
                  </div>
                  <div className="text-[10.5px] mt-1" style={{ color: "var(--ink-4)" }}>Skattefritt enligt Skatteverket 2026</div>
                </div>
              )}

              <div className="px-4 py-3.5 flex items-center justify-between" style={{ background: "var(--bg-warm)" }}>
                <span className="font-display font-semibold text-[14px]">Total reseräkning</span>
                <span className="font-display num font-semibold text-[20px]">{grandTotal.toLocaleString("sv-SE")} <span className="text-[12px] opacity-60 font-normal">kr</span></span>
              </div>
            </div>

            <div className="card px-3.5 py-3 flex items-start gap-2.5" style={{ background: "var(--bg-warm)", borderColor: "var(--line)" }}>
              <Icon name="info" size={14} style={{ color: "var(--ink-3)", marginTop: 1, flexShrink: 0 }} />
              <div className="text-[11.5px]" style={{ color: "var(--ink-2)" }}>
                <span className="font-semibold" style={{ color: "var(--ink)" }}>Skickas till Anders Hellström för attest.</span> Skattefria delar (traktamente, milersättning) betalas ut separat enligt Skatteverkets regelverk.
              </div>
            </div>
          </div>
        )}
      </div>

      <div className="p-4" style={{ borderTop: "1px solid var(--line)" }}>
        {step < 4 ? (
          <button onClick={goNext}
            disabled={step === 1 && !destination}
            className="w-full py-3 rounded-lg text-[13.5px] font-semibold"
            style={{ background: (step === 1 && !destination) ? "var(--line)" : "var(--ink)", color: (step === 1 && !destination) ? "var(--ink-4)" : "white" }}>
            Fortsätt
          </button>
        ) : (
          <button onClick={submit}
            className="w-full py-3 rounded-lg text-[13.5px] font-semibold"
            style={{ background: "var(--primary)", color: "white" }}>
            Skicka in reseräkning ({grandTotal.toLocaleString("sv-SE")} kr)
          </button>
        )}
      </div>
    </div>
  );
};

const NumberRow = ({ label, sublabel, value, onChange, last }) => (
  <div className="px-4 py-3 flex items-center justify-between" style={{ borderBottom: last ? "none" : "1px solid var(--line-2)" }}>
    <div>
      <div className="text-[13px]" style={{ color: "var(--ink-2)" }}>{label}</div>
      {sublabel && <div className="text-[10.5px]" style={{ color: "var(--ink-4)" }}>{sublabel}</div>}
    </div>
    <div className="flex items-center gap-2">
      <button onClick={() => onChange(Math.max(0, (parseInt(value) || 0) - 1).toString())}
        style={{ width: 26, height: 26, borderRadius: 13, background: "var(--bg-warm)", color: "var(--ink-2)", border: "1px solid var(--line)", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <Icon name="x" size={11} style={{ transform: "rotate(0)" }} />
      </button>
      <span className="num font-semibold text-[15px]" style={{ minWidth: 24, textAlign: "center" }}>{value}</span>
      <button onClick={() => onChange(((parseInt(value) || 0) + 1).toString())}
        style={{ width: 26, height: 26, borderRadius: 13, background: "var(--ink)", color: "white", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <Icon name="plus" size={11} strokeWidth={2.4} />
      </button>
    </div>
  </div>
);

/* ================================================================
   EXPENSE DETAIL — shows status timeline + breakdown
   ================================================================ */

const ExpenseDetail = ({ expense, onClose }) => {
  const isTravel = expense.type === "travel";
  const t = expense.tripDetails;
  const statusMeta = {
    godkand: { tone: "green", label: "Godkänt", color: "var(--success-text)", bg: "var(--green-soft)" },
    vantar: { tone: "amber", label: "Väntar attest", color: "#7A5300", bg: "var(--amber-soft)" },
    avslagen: { tone: "rust", label: "Avslaget", color: "var(--rust)", bg: "rgba(176,67,27,0.10)" },
    komplettering: { tone: "amber", label: "Komplettering begärd", color: "#7A5300", bg: "var(--amber-soft)" },
  }[expense.status] || { tone: "neutral", label: expense.status, color: "var(--ink-3)", bg: "var(--bg-warm)" };

  return (
    <div className="fade-in" style={{ position: "absolute", inset: 0, background: "var(--bg)", zIndex: 60, display: "flex", flexDirection: "column" }}>
      <div className="px-5 py-3.5 flex items-center justify-between" style={{ borderBottom: "1px solid var(--line)", background: "white" }}>
        <button onClick={onClose} style={{ color: "var(--ink-2)" }}>
          <Icon name="chevL" size={20} />
        </button>
        <div className="font-display font-semibold text-[15px]">{isTravel ? "Reseräkning" : "Utlägg"}</div>
        <div style={{ width: 20 }} />
      </div>

      <div className="flex-1 overflow-y-auto p-4 space-y-4">
        {/* Hero */}
        <div className="card overflow-hidden" style={{ background: "linear-gradient(135deg, #122121 0%, #1d3a35 100%)", color: "white", border: "none" }}>
          <div className="px-5 py-5">
            <div className="flex items-center gap-3 mb-3">
              <div style={{ width: 40, height: 40, borderRadius: 10, background: "rgba(255,255,255,0.12)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                <Icon name={expense.icon} size={18} />
              </div>
              <div className="flex-1 min-w-0">
                <div className="font-display font-semibold text-[15px] truncate">{expense.merchant}</div>
                <div className="text-[11.5px] opacity-70 truncate">{expense.purpose}</div>
              </div>
            </div>
            <div className="font-display num font-semibold" style={{ fontSize: 30, letterSpacing: "-0.02em" }}>
              {expense.amount.toLocaleString("sv-SE")} <span className="text-[14px] opacity-60 font-normal">kr</span>
            </div>
            <div className="text-[11.5px] opacity-70 mt-1 num">{expense.date}</div>
          </div>
        </div>

        {/* Status */}
        <div className="card px-4 py-3" style={{ background: statusMeta.bg, borderColor: "transparent" }}>
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-2">
              <Icon name={expense.status === "godkand" ? "check2" : expense.status === "avslagen" ? "x" : "clock"} size={15} style={{ color: statusMeta.color }} strokeWidth={2.2} />
              <span className="text-[13px] font-semibold" style={{ color: statusMeta.color }}>{statusMeta.label}</span>
            </div>
            {expense.status === "vantar" && (
              <span className="text-[11px]" style={{ color: statusMeta.color }}>Hos Anders Hellström</span>
            )}
            {expense.status === "komplettering" && (
              <span className="text-[11px]" style={{ color: statusMeta.color }}>Från Anders Hellström</span>
            )}
          </div>
        </div>

        {/* Manager question (if komplettering) */}
        {expense.status === "komplettering" && expense.managerQuestion && (
          <div className="card overflow-hidden">
            <div className="px-4 py-3 flex items-start gap-3">
              <Avatar initials="AH" size={32} color="var(--ink-2)" />
              <div className="flex-1">
                <div className="text-[10.5px] uppercase tracking-wider font-semibold mb-1" style={{ color: "var(--ink-3)", letterSpacing: "0.06em" }}>Anders Hellström frågar</div>
                <div className="text-[13px] leading-snug" style={{ color: "var(--ink)" }}>"{expense.managerQuestion}"</div>
              </div>
            </div>
            <button className="w-full py-2.5 text-[12.5px] font-semibold flex items-center justify-center gap-1.5"
              style={{ background: "var(--primary)", color: "white", borderTop: "1px solid var(--line-2)" }}>
              <Icon name="send" size={12} /> Svara och skicka in igen
            </button>
          </div>
        )}

        {/* Travel breakdown */}
        {isTravel && t && (
          <div>
            <div className="eyebrow mb-2 px-1">Specifikation</div>
            <div className="card overflow-hidden">
              {t.items && t.items.length > 0 && (

   ================================================================ */

const ManagerApprovals = () => {
  const { approvals, approveItem, declineItem, requestInfo, findLinkedRecord } = useAppState();
  const [filter, setFilter] = useState("all");
  const [justActed, setJustActed] = useState(null);
  const [openApproval, setOpenApproval] = useState(null);

  const flash = (msg) => {
    setJustActed(msg);
    setTimeout(() => setJustActed(null), 2800);
  };

  const approve = (id) => {
    const item = approveItem(id);
    if (item) flash(`${item.title} godkänd för ${item.employeeName}.`);
    setOpenApproval(null);
  };
  const decline = (id) => {
    const item = declineItem(id);
    if (item) flash(`${item.title} avslagen för ${item.employeeName}.`);
    setOpenApproval(null);
  };
  const askForMore = (id, question) => {
    const item = requestInfo(id, question);
    if (item) flash(`Begärt komplettering från ${item.employeeName}.`);
    setOpenApproval(null);
  };

  const filtered = filter === "all" ? approvals : approvals.filter(i => i.type === filter);

  return (
    <div>
      <AppHeader title="Attestkö" subtitle={`${approvals.length} ${approvals.length === 1 ? "post" : "poster"} väntar`} large />

      <div className="px-4 pb-6">
        {justActed && (
          <div className="fade-in mb-3 px-3.5 py-2.5 rounded-lg flex items-center gap-2"
            style={{ background: "var(--green-soft)", border: "1px solid var(--success)" }}>
            <Icon name="check2" size={14} strokeWidth={2.4} style={{ color: "var(--success-text)" }} />
            <span className="text-[12px]" style={{ color: "var(--success-text)" }}>{justActed}</span>
          </div>
        )}

        {/* Filter pills */}
        <div className="flex gap-2 mb-3 overflow-x-auto" style={{ scrollbarWidth: "none" }}>
          {[
            { id: "all", label: "Alla", count: approvals.length },
            { id: "time", label: "Tider", count: approvals.filter(i => i.type === "time").length },
            { id: "absence", label: "Ledighet", count: approvals.filter(i => i.type === "absence").length },
            { id: "expense", label: "Utlägg", count: approvals.filter(i => i.type === "expense").length },
          ].map(f => (
            <button key={f.id} onClick={() => setFilter(f.id)}
              className="px-3 py-1.5 rounded-full text-[12px] font-medium whitespace-nowrap transition"
              style={{
                background: filter === f.id ? "var(--ink)" : "white",
                color: filter === f.id ? "white" : "var(--ink-2)",
                border: filter === f.id ? "1px solid var(--ink)" : "1px solid var(--line)",
              }}>
              {f.label} <span className="num opacity-70 ml-0.5">{f.count}</span>
            </button>
          ))}
        </div>

        {filtered.length === 0 && (
          <div className="card px-5 py-10 text-center">
            <div style={{ width: 50, height: 50, borderRadius: 25, background: "var(--green-soft)", display: "inline-flex", alignItems: "center", justifyContent: "center", marginBottom: 12 }}>
              <Icon name="check2" size={22} strokeWidth={2.4} style={{ color: "var(--success-text)" }} />
            </div>
            <div className="text-[14px] font-semibold mb-1">Inkorgen är tom</div>
            <div className="text-[12px]" style={{ color: "var(--ink-3)" }}>Allt är hanterat.</div>
          </div>
        )}

        <div className="space-y-2.5">
          {filtered.map(item => {
            const isExpense = item.type === "expense";
            const linked = isExpense ? findLinkedRecord(item.id) : null;
            const canDrillIn = isExpense && linked && linked.record;
            return (
              <div key={item.id} className="card overflow-hidden slide-up">
                <div className="px-4 py-3.5">
                  <button
                    onClick={() => canDrillIn && setOpenApproval(item)}

                        </div>
                        <div className="flex items-center gap-1.5 mb-1">

                          <span>Skickat {item.submitted}</span>

                            <>
                              <span>·</span>
                              <span className="flex items-center gap-0.5 font-medium" style={{ color: "var(--ink-3)" }}>
                                Granska <Icon name="chevR" size={10} />
                              </span>
                            </>
                          )}
                        </div>
                      </div>
                    </div>
                  </button>
                  <div className="grid grid-cols-2 gap-2 mt-3">
                    <button onClick={() => decline(item.id)}
                      className="py-2 rounded-lg text-[12.5px] font-medium"
                      style={{ background: "white", color: "var(--ink-2)", border: "1px solid var(--line)" }}>
                      Avslå
                    </button>
                    <button onClick={() => approve(item.id)}
                      className="py-2 rounded-lg text-[12.5px] font-semibold flex items-center justify-center gap-1"
                      style={{ background: "var(--primary)", color: "white" }}>
                      <Icon name="check2" size={13} strokeWidth={2.4} /> Godkänn
                    </button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {openApproval && (
        <ApprovalExpenseDetail
          approval={openApproval}
          onClose={() => setOpenApproval(null)}
          onApprove={() => approve(openApproval.id)}
          onDecline={() => decline(openApproval.id)}
          onRequestInfo={(q) => askForMore(openApproval.id, q)}
        />
      )}
    </div>
  );
};

/* ================================================================
   APP — phone shell, persona switching, routing
   ================================================================ */

const App = () => {
  const [role, setRole] = useState("employee");
  const [tab, setTab] = useState("home");
  const { resetAll } = useAppState();

  const switchRole = () => {
    setRole(role === "employee" ? "manager" : "employee");
    setTab("home");
  };

  const handleReset = () => {
    resetAll();
    setRole("employee");
    setTab("home");
  };

  const renderTab = () => {
    if (role === "employee") {
      switch (tab) {
        case "home":     return <EmployeeHome role={role} switchRole={switchRole} setTab={setTab} />;
        case "time":     return <EmployeeTime />;
        case "expenses": return <EmployeeExpenses />;
        case "me":       return <EmployeeMe role={role} switchRole={switchRole} />;
        default:         return null;
      }
    } else {
      switch (tab) {
        case "home":      return <ManagerHome switchRole={switchRole} setTab={setTab} />;
        case "approvals": return <ManagerApprovals />;
        case "team":      return <ManagerTeam />;
        case "me":        return <EmployeeMe role={role} switchRole={switchRole} />;
        default:          return null;
      }
    }
  };

  return (
    <div className="phone-frame">
      <div className="persona-switcher">
        <button onClick={() => { setRole("employee"); setTab("home"); }}
          className={"persona-pill" + (role === "employee" ? " active" : "")}>
          <Icon name="user" size={11} className="inline mr-1.5" /> Anställd
        </button>
        <button onClick={() => { setRole("manager"); setTab("home"); }}
          className={"persona-pill" + (role === "manager" ? " active" : "")}>
          <Icon name="users" size={11} className="inline mr-1.5" /> Chef
        </button>
      </div>

      <div className="frame-meta">
        Kontek Sphere · Erik Bergström, Produktionsledare hos Norrström Industrier
        <button onClick={handleReset}
          style={{ marginLeft: 12, padding: "3px 10px", borderRadius: 6, background: "rgba(255,255,255,0.08)", color: "rgba(255,255,255,0.7)", border: "1px solid rgba(255,255,255,0.12)", fontSize: 10.5, cursor: "pointer" }}
          onMouseEnter={e => { e.currentTarget.style.background = "rgba(255,255,255,0.15)"; e.currentTarget.style.color = "white"; }}
          onMouseLeave={e => { e.currentTarget.style.background = "rgba(255,255,255,0.08)"; e.currentTarget.style.color = "rgba(255,255,255,0.7)"; }}>
          ↻ Återställ prototyp
        </button>
      </div>

      <div className="phone-screen">
        <div className="phone-island" />
        <StatusBar />
        <div className="phone-content">
          {renderTab()}
        </div>
        <TabBar activeTab={tab} setTab={setTab} role={role} />
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(
  <AppStateProvider><App /></AppStateProvider>
);
</script>
</body>
</html>
