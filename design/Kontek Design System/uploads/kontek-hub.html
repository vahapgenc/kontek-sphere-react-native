    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    color: var(--ink-4);
  }
  .card {
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid var(--line);
  }
  .card-hover { transition: all 0.15s ease; }
  .card-hover:hover {
    border-color: var(--ink-5);
    box-shadow: 0 4px 14px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.03);
    transform: translateY(-1px);
  }
  .row-tap { transition: background 0.12s ease; cursor: pointer; }
  .row-tap:hover { background: var(--bg-2); }
  .btn-primary {
    background: #395F61; color: white; font-weight: 500; font-size: 13.5px;
    padding: 9px 16px; border-radius: 8px;
    transition: all 0.15s ease;
  }
  .btn-primary:hover { background: #052225; transform: translateY(-1px); }
  .btn-primary:active { background: #052225; transform: none; }
  .btn-primary:focus-visible { outline: 2px solid #395F61; outline-offset: 2px; }
  .btn-primary:disabled, .btn-primary[disabled] {
    background: #E2E4E9; color: #9CA3AE; cursor: not-allowed; transform: none;
  }
  .btn-secondary {
    background: white; color: var(--ink-2); font-weight: 500; font-size: 13.5px;
    padding: 9px 16px; border-radius: 8px; border: 1px solid var(--line);
    transition: all 0.15s ease;
  }
  .btn-secondary:hover { border-color: var(--ink-5); }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; border-radius: 8px;
    color: var(--ink-3); font-size: 13.5px; font-weight: 500;
    cursor: pointer; transition: all 0.12s ease;
  }
  .nav-item:hover { background: var(--bg-2); color: var(--ink); }
  .nav-item.active {
    background: var(--ink); color: white;
  }
  .product-tile {
    transition: all 0.18s ease;
  }
  .product-tile:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
  }
  .fade-in { animation: fadeIn 0.22s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .slide-in-right { animation: slideRight 0.25s ease; }
  @keyframes slideRight {
    from { opacity: 0; transform: translateX(8px); }
    to { opacity: 1; transform: translateX(0); }
  }
  /* checkbox-like indicator */
  .dot { width: 6px; height: 6px; border-radius: 3px; display: inline-block; }
  /* persona switcher */
  .persona-bar {
    background: var(--brand);
    color: rgba(255,255,255,0.85);
    font-size: 11px;
    padding: 8px 16px;
    display: flex; align-items: center; justify-content: space-between;
    letter-spacing: 0.02em;
  }
  .persona-pill {
    padding: 4px 10px; border-radius: 99px; font-size: 11px; font-weight: 500;
    background: rgba(255,255,255,0.10); color: rgba(255,255,255,0.7);
    border: 1px solid rgba(255,255,255,0.10); cursor: pointer;
    transition: all 0.15s ease;
  }
  .persona-pill:hover { background: rgba(255,255,255,0.16); color: white; }
  .persona-pill.active {
    background: var(--green-2); color: var(--brand);
    border-color: var(--green-2);

const AppContext = createContext(null);
const useApp = () => useContext(AppContext);

const AppProvider = ({ children }) => {
  const [persona, setPersona] = useState("customer"); // "customer" | "agency"
  const [stage, setStage] = useState("website"); // "website" | "login" | "app"
  const [activeView, setActiveView] = useState("home");
  const [activeClient, setActiveClient] = useState(null); // for agency drill-down
  // Marketplace integrations installed
  const [installed, setInstalled] = useState(() => new Set(MARKETPLACE_ITEMS.filter(m => m.status === "active").map(m => m.id)));

  const user = persona === "customer" ? CUSTOMER_USER : AGENCY_USER;
  const products = persona === "customer" ? CUSTOMER_PRODUCTS : AGENCY_PRODUCTS;
  const agreements = persona === "customer" ? CUSTOMER_AGREEMENTS : AGENCY_AGREEMENTS;
  const invoices = persona === "customer" ? CUSTOMER_INVOICES : AGENCY_INVOICES;
  const team = persona === "customer" ? CUSTOMER_TEAM_USERS : AGENCY_TEAM_USERS;

  const switchPersona = (p) => {
    setPersona(p);
    setActiveView("home");
    setActiveClient(null);
  };

  const reset = () => {
    setPersona("customer");
    setStage("website");
    setActiveView("home");
    setActiveClient(null);
    setInstalled(new Set(MARKETPLACE_ITEMS.filter(m => m.status === "active").map(m => m.id)));
  };

  const installItem = (id) => setInstalled(prev => new Set([...prev, id]));
  const uninstallItem = (id) => setInstalled(prev => { const n = new Set(prev); n.delete(id); return n; });

  return (
    <AppContext.Provider value={{
      persona, switchPersona,
      stage, setStage,
      activeView, setActiveView,
      activeClient, setActiveClient,
      user, products, agreements, invoices, team,
      installed, installItem, uninstallItem,
      reset,
    }}>
      {children}
    </AppContext.Provider>
  );
};

const Pill = ({ children, tone = "neutral", dot = false, size = "md" }) => {

const MarketplaceView = () => {
  const { installed, installItem, uninstallItem } = useApp();
  const [filter, setFilter] = useState("all"); // all | active | available | coming
  const [category, setCategory] = useState("all");
  const [search, setSearch] = useState("");
  const [openItem, setOpenItem] = useState(null);

  const categories = ["all", ...Array.from(new Set(MARKETPLACE_ITEMS.map(i => i.category)))];

  const filtered = MARKETPLACE_ITEMS.filter(it => {
    if (filter === "active" && !installed.has(it.id)) return false;
    if (filter === "available" && (installed.has(it.id) || it.status === "coming")) return false;
    if (filter === "coming" && it.status !== "coming") return false;
    if (category !== "all" && it.category !== category) return false;
    if (search && !it.name.toLowerCase().includes(search.toLowerCase()) && !it.description.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  return (
    <div className="fade-in" style={{ padding: "32px 40px", maxWidth: 1200, margin: "0 auto" }}>
      <ViewHeader
        eyebrow="Marknadsplats"
        title="Integrationer för Kontek"
        subtitle="Koppla Kontek mot bank, bokföring, myndigheter, pension, förmåner och fler system. Aktivera de du behöver, alla aktiveras direkt utan installation."
      />

      {/* Filter bar */}
      <div className="flex items-center gap-2 mb-5">
        <div className="flex items-center gap-1 p-1 rounded-lg" style={{ background: "var(--bg-2)" }}>
          {[
            { id: "all", label: "Alla", count: MARKETPLACE_ITEMS.length },
            { id: "active", label: "Aktiva", count: installed.size },
            { id: "available", label: "Tillgängliga", count: MARKETPLACE_ITEMS.filter(i => !installed.has(i.id) && i.status !== "coming").length },
            { id: "coming", label: "Kommande", count: MARKETPLACE_ITEMS.filter(i => i.status === "coming").length },
          ].map(f => (
            <button key={f.id} onClick={() => setFilter(f.id)}
              className="px-3 py-1.5 rounded-md text-[12px] font-medium transition flex items-center gap-1.5"
              style={{
                background: filter === f.id ? "white" : "transparent",
                color: filter === f.id ? "var(--ink)" : "var(--ink-3)",
                boxShadow: filter === f.id ? "0 1px 3px rgba(0,0,0,0.06)" : "none",
              }}>
              {f.label}
              <span className="num text-[10.5px] px-1.5 rounded" style={{ background: filter === f.id ? "var(--bg-2)" : "transparent", color: filter === f.id ? "var(--ink-3)" : "var(--ink-4)" }}>{f.count}</span>
            </button>
          ))}
        </div>
        <select value={category} onChange={e => setCategory(e.target.value)}
          className="px-3 py-1.5 rounded-md text-[12px] outline-none"
          style={{ background: "white", border: "1px solid var(--line)", color: "var(--ink-2)" }}>
          {categories.map(c => <option key={c} value={c}>{c === "all" ? "Alla kategorier" : c}</option>)}
        </select>
        <div className="ml-auto flex items-center gap-2 px-3 py-1.5 rounded-md" style={{ background: "white", border: "1px solid var(--line)" }}>
          <Icon name="search" size={13} style={{ color: "var(--ink-4)" }} />
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Sök integration..."
            className="text-[12px] outline-none bg-transparent" style={{ width: 160 }} />
        </div>
      </div>

      {/* Grid of integrations */}
      <div className="grid grid-cols-3 gap-3">
        {filtered.map(it => (
          <MarketplaceCard key={it.id} item={it} installed={installed.has(it.id)} onOpen={() => setOpenItem(it)} />
        ))}
      </div>

      {filtered.length === 0 && (
        <div className="card p-10 text-center">
          <Icon name="search" size={26} style={{ color: "var(--ink-4)", margin: "0 auto 12px", display: "block" }} />
          <div className="text-[13px] font-semibold mb-1">Inga matchande integrationer</div>
          <div className="text-[12px]" style={{ color: "var(--ink-3)" }}>Prova ett annat filter eller sökord.</div>
        </div>
      )}

      {openItem && <MarketplaceDetail item={openItem} installed={installed.has(openItem.id)} onClose={() => setOpenItem(null)} onInstall={() => { installItem(openItem.id); setOpenItem(null); }} onUninstall={() => { uninstallItem(openItem.id); setOpenItem(null); }} />}
    </div>
  );
};

  const isComing = item.status === "coming";
  return (
    <div className="card card-hover cursor-pointer p-4" onClick={onOpen}>
      <div className="flex items-start justify-between mb-3">
        <div style={{ width: 38, height: 38, borderRadius: 9, background: item.color + "18", color: item.color, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>

      <div className="flex items-center gap-1.5 mb-0.5">

      <div className="text-[10.5px] mb-2" style={{ color: "var(--ink-4)" }}>{item.category}{item.official && " · Officiell"}</div>

const SettingRow = ({ label, value, mono, tone, last }) => (
  <div className="flex items-center justify-between py-2.5" style={{ borderBottom: last ? "none" : "1px solid var(--line-2)" }}>
    <span className="text-[12px]" style={{ color: "var(--ink-3)" }}>{label}</span>

      <span className={"text-[12.5px] font-semibold" + (mono ? " num" : "")}>{value}</span>}

const SettingToggleRow = ({ label, sub, enabled = false, last }) => {
  const [on, setOn] = useState(enabled);
  return (
    <div className="flex items-center justify-between py-3" style={{ borderBottom: last ? "none" : "1px solid var(--line-2)" }}>
      <div className="flex-1">

        {sub && <div className="text-[11px]" style={{ color: "var(--ink-3)" }}>{sub}</div>}
      </div>
      <button onClick={() => setOn(!on)}
        style={{
          width: 34, height: 20, borderRadius: 10, padding: 2,
          background: on ? "var(--green-2)" : "var(--line)",
          transition: "background 0.15s",
          position: "relative",
        }}>
        <div style={{
          width: 16, height: 16, borderRadius: 8, background: "white",
          transform: on ? "translateX(14px)" : "translateX(0)",
          transition: "transform 0.15s",
          boxShadow: "0 1px 2px rgba(0,0,0,0.15)",
        }} />
      </button>
    </div>
  );
};

  };

  return (
    <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", background: "var(--bg)" }}>
      {/* Persona bar (demo only) */}
      <div className="persona-bar">
        <div className="flex items-center gap-3">
          <span style={{ color: "var(--green-2)", fontWeight: 600, letterSpacing: "0.05em" }}>DEMO</span>
          <span style={{ color: "rgba(255,255,255,0.5)" }}>·</span>
          <span>Du är inloggad som</span>
          <button onClick={() => switchPersona("customer")} className={"persona-pill" + (persona === "customer" ? " active" : "")}>
            <Icon name="building" size={11} style={{ marginRight: 4, display: "inline-block", verticalAlign: -1 }} /> Slutkund
          </button>
          <button onClick={() => switchPersona("agency")} className={"persona-pill" + (persona === "agency" ? " active" : "")}>
            <Icon name="briefcase" size={11} style={{ marginRight: 4, display: "inline-block", verticalAlign: -1 }} /> Redovisningsbyrå
          </button>
        </div>
        <div className="flex items-center gap-2">
          <button onClick={() => setStage("website")} className="persona-pill" style={{ background: "transparent" }}>
            ← Tillbaka till kontek.se
          </button>
          <button onClick={reset} className="persona-pill" style={{ background: "transparent" }}>
            ↻ Återställ
          </button>
        </div>
      </div>

      <TopBar />
      <div style={{ flex: 1, display: "flex", overflow: "hidden" }}>
        <Sidebar />
        <main style={{ flex: 1, overflowY: "auto" }}>
          {renderView()}
        </main>
      </div>
    </div>
  );
};

const App = () => {
  const { stage, reset } = useApp();

  // Small reset banner only on website + login stages
  const DemoBar = () => (
    <div style={{
      position: "fixed", bottom: 16, right: 16, zIndex: 100,
      background: "var(--ink)", color: "white",
      padding: "8px 14px", borderRadius: 99,
      boxShadow: "0 6px 18px rgba(0,0,0,0.25)",
      display: "flex", alignItems: "center", gap: 10,
      fontSize: 11, fontWeight: 500,
    }}>
      <span style={{ color: "var(--green-2)", fontWeight: 600, letterSpacing: "0.05em" }}>DEMO</span>
      <span style={{ color: "rgba(255,255,255,0.4)" }}>·</span>
      <button onClick={reset} style={{ color: "rgba(255,255,255,0.7)" }}>↻ Återställ</button>
    </div>
  );

  if (stage === "website") return <><WebsiteView /><DemoBar /></>;
  if (stage === "login") return <><LoginView /><DemoBar /></>;
  return <AppShell />;
};

class ErrorBoundary extends React.Component {
  constructor(p) { super(p); this.state = { e: null }; }
  static getDerivedStateFromError(e) { return { e }; }
  componentDidCatch(e, info) { console.error(e, info); }
  render() {
    if (this.state.e) {
      return <div style={{ padding: 40, fontFamily: "monospace", whiteSpace: "pre-wrap", color: "red" }}>{String(this.state.e?.stack || this.state.e)}</div>;
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary>
    <AppProvider><App /></AppProvider>
  </ErrorBoundary>
);
</script>
</body>
</html>
