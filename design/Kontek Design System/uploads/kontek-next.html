const AbsenceEditor = ({ mode = "create", absence, employees, defaultStart, onClose, onSave, onDelete }) => {
  const [employeeId, setEmployeeId] = useState(absence?.employeeId || employees[0]?.id);
  const [type, setType] = useState(absence?.type || "semester");
  const [start, setStart] = useState(absence?.start || defaultStart || new Date().toISOString().slice(0, 10));
  const [end, setEnd] = useState(absence?.end || defaultStart || new Date().toISOString().slice(0, 10));
  const [note, setNote] = useState(absence?.note || "");
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [errors, setErrors] = useState({});

  const handleSave = () => {
    const errs = {};
    if (!employeeId) errs.employeeId = "Välj anställd";
    if (!start) errs.start = "Ange startdatum";
    if (!end) errs.end = "Ange slutdatum";
    if (start && end && start > end) errs.end = "Slutdatum kan inte vara före startdatum";
    if (Object.keys(errs).length) { setErrors(errs); return; }
    onSave({ employeeId: Number(employeeId), type, start, end, note });
  };

  const employee = employees.find(e => e.id === employeeId);

  // Calculate duration
  const startDate = new Date(start);
  const endDate = new Date(end);
  const dayCount = isNaN(startDate) || isNaN(endDate) ? 0 : Math.floor((endDate - startDate) / 86400000) + 1;

  return (
    <div className="fixed inset-0 flex items-center justify-center fade-in"
      style={{ background: "rgba(15,17,18,0.55)", zIndex: 100, padding: 32 }}
      onClick={onClose}>
      <div className="rounded-xl overflow-hidden flex flex-col"
        style={{ background: "var(--bg)", width: 560, maxHeight: "90vh", boxShadow: "0 24px 60px rgba(0,0,0,0.3)" }}
        onClick={e => e.stopPropagation()}>
        <div className="px-6 py-4 flex items-center justify-between" style={{ borderBottom: "1px solid var(--line)", background: "white" }}>
          <div>
            <div className="eyebrow mb-0.5" style={{ color: "var(--green)" }}>
              {mode === "edit" ? "Redigera frånvaro" : "Ny frånvaro"}
            </div>
            <h2 className="font-display text-[17px] font-medium">
              {mode === "edit" ? (employee ? employee.name : "Frånvaro") : "Lägg till frånvaro"}
            </h2>
          </div>
          <button onClick={onClose} className="p-1.5 rounded-lg hover:bg-gray-100 transition" style={{ color: "var(--ink-3)" }}>
            <Icon name="x" size={16} />
          </button>
        </div>

        <div className="px-6 py-5 overflow-y-auto" style={{ flex: 1 }}>
          {mode === "create" && (
            <>
              <div className="text-[11px] uppercase tracking-wider font-medium mb-1.5" style={{ color: "var(--ink-4)", letterSpacing: "0.06em" }}>Anställd</div>
              <select value={employeeId || ""}
                onChange={e => { setEmployeeId(Number(e.target.value)); setErrors({}); }}
                className="w-full text-[13px] px-3 py-2 rounded-lg outline-none mb-4"
                style={{ background: "white", border: "1px solid var(--line)", color: "var(--ink)" }}>
                {employees.map(e => (
                  <option key={e.id} value={e.id}>{e.name} · {e.dept}</option>
                ))}
              </select>
              {errors.employeeId && <span className="text-[11px] block -mt-3 mb-3" style={{ color: "var(--rust)" }}>{errors.employeeId}</span>}
            </>
          )}

          {mode === "edit" && employee && (
            <div className="flex items-center gap-3 mb-4 px-3 py-2 rounded-lg"
              style={{ background: "var(--bg-warm)", border: "1px solid var(--line-2)" }}>

                <div className="text-[13px] font-medium">{employee.name}</div>

            {ABSENCE_TYPES.map(t => (
              <button key={t.id} onClick={() => setType(t.id)}
                className="px-3 py-2 rounded-lg text-[12.5px] flex items-center gap-2 transition text-left"

                  background: type === t.id ? t.color : "white",
                  color: type === t.id ? "white" : "var(--ink-2)",
                  border: "1px solid " + (type === t.id ? t.color : "var(--line)"),
                  fontWeight: type === t.id ? 500 : 400,

          <div className="grid grid-cols-2 gap-4 mb-4">

              <div className="text-[11px] uppercase tracking-wider font-medium mb-1.5" style={{ color: "var(--ink-4)", letterSpacing: "0.06em" }}>Från och med</div>
              <input type="date" value={start}

                className="w-full text-[13px] px-2.5 py-2 rounded-lg outline-none"
                style={{ background: "white", border: "1px solid var(--line)", color: "var(--ink)" }} />
              {errors.start && <span className="text-[11px] block mt-1" style={{ color: "var(--rust)" }}>{errors.start}</span>}

            placeholder="T.ex. Sportlov, läkarbesök, semester med familj..."
            className="w-full text-[12.5px] px-3 py-2 rounded-lg outline-none"
            style={{ background: "white", border: "1px solid var(--line)", color: "var(--ink)", minHeight: 60, resize: "vertical" }} />
        </div>

        <div className="px-6 py-4 flex items-center justify-between" style={{ borderTop: "1px solid var(--line)", background: "white" }}>
          {mode === "edit" && onDelete ? (
            confirmDelete ? (
              <button onClick={onDelete}
                className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[12px] transition fade-in"

                <Icon name="trash" size={12} /> Bekräfta borttagning

              <button onClick={() => setConfirmDelete(true)}

                <Icon name="trash" size={12} /> Ta bort
              </button>
            )
          ) : <div />}
          <div className="flex gap-2">
            <button onClick={onClose} className="btn btn-ghost">Avbryt</button>
            <button onClick={handleSave} className="btn btn-green">
              <Icon name="check2" size={13} /> {mode === "edit" ? "Spara ändringar" : "Lägg till"}

          </div>
        </div>
      </div>
    </div>
  );
};

    if (statusFilter === "Väntar attest" && r.status !== "vantar_attest") return false;
    if (statusFilter === "Klar" && r.status !== "klar") return false;
    if (search && !r.employee.name.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  // Statistics
  const klarCount = allRows.filter(r => r.status === "klar").length;
  const vantarCount = allRows.filter(r => r.status === "vantar_attest").length;
  const saknasCount = allRows.filter(r => r.status === "saknas" && r.remindable).length;
  const totalAffected = allRows.length;
  const pctKlar = totalAffected > 0 ? Math.round((klarCount / totalAffected) * 100) : 0;

  // Mock deadline
  const deadlineDate = "2026-05-23";
  const today = new Date();
  const dl = new Date(deadlineDate);
  const daysToDeadline = Math.ceil((dl - today) / 86400000);

  const prevMonth = () => {
    if (month === 0) { setMonth(11); setYear(year - 1); }
    else setMonth(month - 1);
  };
  const nextMonth = () => {
    if (month === 11) { setMonth(0); setYear(year + 1); }
    else setMonth(month + 1);
  };

  const sendReminder = (id) => {
    setReminderSent({ ...reminderSent, [id]: true });
    const emp = employees.find(e => e.id === id);
    flash(`Påminnelse skickad till ${emp?.name}.`);
  };

  const selectedRow = selectedId ? allRows.find(r => r.employee.id === selectedId) : null;

  // Sort: saknas first, then vantar_attest, then klar; within each by employee name
  const sortOrder = { saknas: 0, vantar_attest: 1, klar: 2 };
  const sortedRows = [...filteredRows].sort((a, b) => {
    const ao = sortOrder[a.status] ?? 3;
    const bo = sortOrder[b.status] ?? 3;
    if (ao !== bo) return ao - bo;
    return a.employee.name.localeCompare(b.employee.name, "sv");
  });

  return (
    <div className="fade-in">
      <TopBar
        breadcrumb={["Tid & Frånvaro", "Tidrapporter"]}
        title="Tidrapporter"
        subtitle={`${swedishMonths[month]} ${year} · ${totalAffected} anställda med tidrapportering · ${klarCount} klara av ${totalAffected}`}
        actions={
          <>
            <button className="btn btn-ghost"><Icon name="download" size={13} /> Exportera</button>
            <button className="btn btn-green" disabled={vantarCount > 0 || saknasCount > 0}
              style={{ opacity: vantarCount > 0 || saknasCount > 0 ? 0.4 : 1, cursor: vantarCount > 0 || saknasCount > 0 ? "not-allowed" : "pointer" }}>
              <Icon name="check2" size={13} /> Lås perioden
            </button>
          </>
        }
      />

      <div className="px-8 py-5">
        {justFlash && (
          <div className="fade-in mb-4 px-4 py-2.5 rounded-lg flex items-center gap-2.5"
            style={{ background: "var(--green-soft)", border: "1px solid var(--success)" }}>
            <Icon name="check2" size={14} strokeWidth={2.4} style={{ color: "var(--success-text)" }} />
            <span className="text-[12.5px]" style={{ color: "var(--success-text)" }}>{justFlash}</span>
          </div>
        )}

        {/* Hero status card */}
        <div className="card grain mb-5 overflow-hidden"
          style={{ background: "linear-gradient(95deg, var(--ink) 0%, #16201a 100%)", borderColor: "var(--ink)" }}>
          <div className="grid items-center gap-6 px-7 py-6" style={{ gridTemplateColumns: "auto 1fr auto" }}>
            {/* Big progress circle */}
            <div style={{ position: "relative", width: 130, height: 130 }}>
              <svg viewBox="0 0 130 130" style={{ position: "absolute", inset: 0 }}>
                <circle cx="65" cy="65" r="56" fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="10" />
                <circle cx="65" cy="65" r="56" fill="none"
                  stroke={pctKlar >= 90 ? "#61BC8F" : pctKlar >= 60 ? "#FFCB80" : "#FF9F8A"}
                  strokeWidth="10"
                  strokeDasharray={`${(pctKlar / 100) * 351.86} 351.86`}
                  strokeLinecap="round"
                  transform="rotate(-90 65 65)" />
              </svg>
              <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", color: "white" }}>
                <div className="font-display num" style={{ fontSize: 32, fontWeight: 600, lineHeight: 1, letterSpacing: "-0.02em" }}>{pctKlar}%</div>
                <div className="text-[10px] opacity-50 uppercase tracking-wider mt-0.5">attesterat</div>
              </div>
            </div>

            <div style={{ color: "white" }}>
              <div className="eyebrow mb-1.5 opacity-60">Tidrapportering · {swedishMonths[month]} {year}</div>
              <h2 className="font-display text-[22px] font-medium leading-tight" style={{ letterSpacing: "-0.015em" }}>
                {klarCount === totalAffected
                  ? "Allt underlag är klart för lönekörning"
                  : `${vantarCount + saknasCount} ${vantarCount + saknasCount === 1 ? "rapport" : "rapporter"} kvar`}
              </h2>
              <div className="flex items-center gap-5 mt-3 text-[12.5px]">
                <div className="flex items-center gap-1.5">
                  <span style={{ width: 9, height: 9, borderRadius: 2, background: "#9DDFB5" }}></span>
                  <span className="num font-medium">{klarCount}</span>
                  <span className="opacity-60">klara</span>
                </div>
                <div className="flex items-center gap-1.5">
                  <span style={{ width: 9, height: 9, borderRadius: 2, background: "#FFCB80" }}></span>
                  <span className="num font-medium">{vantarCount}</span>
                  <span className="opacity-60">väntar attest</span>
                </div>
                <div className="flex items-center gap-1.5">
                  <span style={{ width: 9, height: 9, borderRadius: 2, background: "#FF9F8A" }}></span>
                  <span className="num font-medium">{saknasCount}</span>
                  <span className="opacity-60">saknas</span>
                </div>
              </div>
            </div>

            <div className="flex flex-col items-end gap-1" style={{ color: "white" }}>
              <div className="eyebrow opacity-60 mb-1">Deadline lönekörning</div>
              <div className="font-display num" style={{ fontSize: 22, fontWeight: 500, letterSpacing: "-0.015em" }}>
                {daysToDeadline > 0 ? `${daysToDeadline} dagar kvar` : daysToDeadline === 0 ? "Idag" : "Försenad"}
              </div>
              <div className="text-[11.5px] opacity-60 num">{deadlineDate}</div>
            </div>
          </div>
        </div>

        {/* Filter bar */}
        <div className="flex items-center gap-3 mb-4">
          <div className="flex items-center gap-1">
            <button onClick={prevMonth} className="p-1.5 rounded-lg transition"
              style={{ border: "1px solid var(--line)", background: "white", color: "var(--ink-2)" }}>
              <Icon name="chevL" size={14} />
            </button>
            <div className="font-display text-[14.5px] font-medium px-3 capitalize" style={{ minWidth: 160, textAlign: "center" }}>
              {swedishMonths[month]} <span className="num">{year}</span>
            </div>
            <button onClick={nextMonth} className="p-1.5 rounded-lg transition"
              style={{ border: "1px solid var(--line)", background: "white", color: "var(--ink-2)" }}>
              <Icon name="chevR" size={14} />
            </button>
          </div>

          <div className="flex items-center gap-2 px-3 py-1.5 rounded-lg ml-3"
            style={{ background: "white", border: "1px solid var(--line)", maxWidth: 220 }}>
            <Icon name="search" size={13} style={{ color: "var(--ink-4)" }} />
            <input value={search} onChange={e => setSearch(e.target.value)}
              placeholder="Sök anställd"
              className="text-[12.5px] outline-none flex-1"
              style={{ background: "transparent", color: "var(--ink)" }} />
          </div>

          <SettingSelect value={deptFilter} options={departments} onChange={setDeptFilter} width={150} />
          <SettingSelect value={statusFilter} options={statusOptions} onChange={setStatusFilter} width={150} />
        </div>

        {/* List */}
        <div className="card overflow-hidden">
          <div className="grid items-center px-5 py-2.5 text-[10.5px] uppercase tracking-wider font-medium"
            style={{
              gridTemplateColumns: "minmax(260px, 2fr) 1.4fr 1fr 1fr 1fr 1fr 40px",
              color: "var(--ink-3)", background: "var(--bg-warm)", borderBottom: "1px solid var(--line)", letterSpacing: "0.06em",
            }}>
            <div>Anställd</div>
            <div>Status</div>
            <div className="text-right">Arbetad tid</div>
            <div className="text-right">Övertid</div>
            <div className="text-right">OB / Restid</div>
            <div>Åtgärd</div>
            <div></div>
          </div>

          {sortedRows.length === 0 && (
            <div className="px-5 py-10 text-center text-[12.5px]" style={{ color: "var(--ink-4)" }}>
              Inga rader matchar filtret.
            </div>
          )}

          {sortedRows.map((r, i) => {
            const e = r.employee;
            const statusMeta = {
              klar: { label: "Klar", tone: "green", icon: "check2" },
              vantar_attest: { label: "Väntar attest", tone: "amber", icon: "clock" },
              saknas: { label: r.remindable ? "Inte rapporterat" : "Ej tillämpligt", tone: r.remindable ? "rust" : "neutral", icon: "alert" },
            }[r.status];
            const isSelected = selectedId === e.id;
            const canDrillIn = r.status === "klar" || r.status === "vantar_attest";

            return (
              <div key={e.id}
                onClick={() => canDrillIn && setSelectedId(e.id)}
                className="grid items-center px-5 py-3 row-hover transition"
                style={{
                  gridTemplateColumns: "minmax(260px, 2fr) 1.4fr 1fr 1fr 1fr 1fr 40px",
                  borderBottom: i === sortedRows.length - 1 ? "none" : "1px solid var(--line-2)",
                  background: isSelected ? "var(--green-tint)" : undefined,
                  cursor: canDrillIn ? "pointer" : "default",
                }}>
                <div className="flex items-center gap-3 min-w-0">
                  <Avatar initials={e.initials} size={32} />
                  <div className="min-w-0">
                    <div className="text-[13px] font-medium truncate">{e.name}</div>
                    <div className="text-[11px] truncate" style={{ color: "var(--ink-4)" }}>{e.dept} · {e.role}</div>
                  </div>
                </div>

                <div>
                  <Pill tone={statusMeta.tone} dot>{statusMeta.label}</Pill>
                  {r.status === "vantar_attest" && (
                    <div className="text-[11px] mt-1" style={{ color: "var(--ink-4)" }}>
                      Hos {r.waitingFor} <span className="num">· {r.waitingDays}d</span>
                    </div>
                  )}
                  {r.status === "klar" && r.approved && (
                    <div className="text-[11px] mt-1 num" style={{ color: "var(--ink-4)" }}>
                      Attest {r.approved}
                    </div>
                  )}
                  {r.status === "saknas" && r.reason && (
                    <div className="text-[11px] mt-1" style={{ color: "var(--ink-4)" }}>{r.reason}</div>
                  )}
                </div>

                <div className="text-right text-[13px] num">
                  {r.arbetad !== undefined ? `${r.arbetad} h` : <span style={{ color: "var(--ink-4)" }}>—</span>}
                </div>

                <div className="text-right text-[13px] num">
                  {r.overtid !== undefined ? (
                    r.overtid > 0 ? (
                      <span style={{ color: r.anomalies?.includes("overtid_avvikelse") ? "var(--amber)" : "var(--ink-2)" }}>
                        {r.overtid} h
                      </span>
                    ) : <span style={{ color: "var(--ink-4)" }}>0</span>
                  ) : <span style={{ color: "var(--ink-4)" }}>—</span>}
                </div>

                <div className="text-right text-[13px] num">
                  {(r.ob ?? 0) + (r.restid ?? 0) > 0
                    ? `${(r.ob ?? 0) + (r.restid ?? 0)} h`
                    : <span style={{ color: "var(--ink-4)" }}>—</span>}
                </div>

                <div onClick={ev => ev.stopPropagation()}>
                  {r.status === "saknas" && r.remindable && (
                    reminderSent[e.id]
                      ? <span className="text-[11.5px] flex items-center gap-1" style={{ color: "var(--success-text)" }}>
                          <Icon name="check2" size={11} /> Påmind
                        </span>
                      : <button onClick={() => sendReminder(e.id)}
                          className="text-[11.5px] flex items-center gap-1 hover:underline" style={{ color: "var(--ink-2)" }}>
                          <Icon name="send" size={11} /> Påminn
                        </button>
                  )}
                  {r.status === "vantar_attest" && (
                    <button className="text-[11.5px] flex items-center gap-1 hover:underline" style={{ color: "var(--ink-2)" }}>
                      <Icon name="send" size={11} /> Knuffa chef
                    </button>
                  )}
                  {r.status === "klar" && (
                    <span className="text-[11.5px] flex items-center gap-1" style={{ color: "var(--ink-4)" }}>
                      Granska
                      <Icon name="chevR" size={11} />
                    </span>
                  )}
                </div>

                <div className="text-right" style={{ color: "var(--ink-4)" }}>
                  {canDrillIn && <Icon name="chevR" size={13} />}
                </div>
              </div>
            );
          })}
        </div>

        <div className="mt-3 text-[11.5px] flex items-center gap-2" style={{ color: "var(--ink-4)" }}>
          <Icon name="info" size={11} />
          Anställda med fast månadslön utan avvikande tider visas inte här eftersom de inte har något underlag att rapportera.
        </div>
      </div>

      {selectedRow && (
        <TimeReportPanel
          row={selectedRow}
          month={month}
          year={year}
          openProfile={openProfile}
          onClose={() => setSelectedId(null)} />
      )}
    </div>
  );
};

/* ----------- Slide-out detail panel for one employee's time report ----------- */

    { num: 18, range: "27 apr – 3 maj", arbetad: 40, overtid: 0, ob: 0 },

            <div>
              <button onClick={() => { onClose(); openProfile && openProfile(e.id); }}

            <Icon name="x" size={16} />
          </button>
        </div>

        <div className="flex-1 overflow-y-auto">
          {/* Status block */}
          <div className="px-6 py-4" style={{ borderBottom: "1px solid var(--line-2)" }}>
            <div className="flex items-center gap-2 mb-2">
              <Pill tone={row.status === "klar" ? "green" : "amber"} dot>
                {row.status === "klar" ? "Klar" : "Väntar attest"}
              </Pill>
              <span className="text-[11.5px]" style={{ color: "var(--ink-4)" }}>
                {swedishMonths[month]} {year}
              </span>
            </div>
            {row.status === "klar" && (
              <div className="text-[12.5px]" style={{ color: "var(--ink-2)" }}>
                Inrapporterat <span className="num">{row.submitted}</span> · Attesterad <span className="num">{row.approved}</span> av <span className="font-medium">{row.approvedBy}</span>
              </div>
            )}
            {row.status === "vantar_attest" && (
              <div className="text-[12.5px]" style={{ color: "var(--ink-2)" }}>
                Inrapporterat <span className="num">{row.submitted}</span> · Väntar på attest hos <span className="font-medium">{row.waitingFor}</span> sedan <span className="num">{row.waitingDays}</span> dagar
              </div>
            )}

          {/* Watson assessment when there are anomalies */}

                tone="review"
                title={`Övertiden ligger ${Math.round((row.overtid / 8 - 1) * 100)}% över snittet`}

          <div className="px-6 py-4">
            <div className="flex items-center justify-between mb-3">

            <div className="card overflow-hidden">

                <div key={w.num} className="grid items-center px-4 py-2.5 row-hover transition"
                  style={{
                    gridTemplateColumns: "80px 1.4fr 80px 80px 80px",
                    borderBottom: i === weeks.length - 1 ? "none" : "1px solid var(--line-2)",

              {/* Totals row */}
              <div className="grid items-center px-4 py-2.5"
                style={{
                  gridTemplateColumns: "80px 1.4fr 80px 80px 80px",
                  background: "var(--bg-warm)", borderTop: "1px solid var(--line)",
                }}>
                <div className="text-[11px] uppercase tracking-wider font-medium" style={{ color: "var(--ink-3)" }}>Totalt</div>
                <div></div>
                <div className="text-right text-[12.5px] num font-medium">{row.arbetad} h</div>
                <div className="text-right text-[12.5px] num font-medium">{row.overtid || 0} h</div>
                <div className="text-right text-[12.5px] num font-medium">{row.ob || 0} h</div>

        {/* Footer actions */}
        <div className="px-6 py-4 flex items-center justify-between" style={{ borderTop: "1px solid var(--line)", background: "var(--bg)" }}>

            className="text-[12px] flex items-center gap-1.5 hover:underline" style={{ color: "var(--ink-3)" }}>
            <Icon name="user" size={11} /> Öppna personalkort
          </button>
          <div className="flex gap-2">
            <button className="btn btn-ghost">Justera</button>
            <button className="btn btn-green"><Icon name="check2" size={13} /> Markera som granskad</button>
          </div>
        </div>
      </div>
    </div>
  );

const Compliance = () => {
  const [activeArea, setActiveArea] = useState("skatt");

  const overallScore = Math.round(COMPLIANCE_AREAS.reduce((s, a) => s + a.score, 0) / COMPLIANCE_AREAS.length);

                return (

                { id: "alla", label: "Alla", count: COMPLIANCE_LAWS.length },
                { id: "pending", label: "Kräver åtgärd", count: COMPLIANCE_LAWS.filter(l => l.status === "pending" || l.status === "inprogress").length },

const App = () => {
  const [active, setActive] = useState("dashboard");
  const [profileId, setProfileId] = useState(null);
  const [aiOpen, setAiOpen] = useState(false);
  const [aiPrefill, setAiPrefill] = useState(null); // { question, context }
  // Sphere sync — banner + visual highlight when data arrives from Sphere
  const [syncBanner, setSyncBanner] = useState(null); // { title, detail, action }
  const { addAbsence, updateAbsence, absences } = useEmployees();

  // global keyboard shortcut
  useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "k") {
        e.preventDefault();
        setAiOpen(o => !o);
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  // Listen on BroadcastChannel "kontek-sync" for events from Sphere
  useEffect(() => {
    if (typeof BroadcastChannel === "undefined") return;
    const channel = new BroadcastChannel("kontek-sync");
    channel.onmessage = (e) => {
      const msg = e.data;
      if (!msg || msg.origin !== "sphere") return;

      if (msg.kind === "absence.created") {
        const p = msg.payload;
        // Add to EmployeeContext.absences in the format the calendar expects
        addAbsence({
          id: p.id,                          // use Sphere's ID so approval can find it
          employeeId: p.employeeId,          // 1 = Erik Bergström
          type: p.type,
          start: p.start,
          end: p.end,
          note: p.note || "",
          status: "vantar",                  // mark as awaiting approval
          source: "sphere",                  // visual marker
          arrivedAt: Date.now(),             // for green highlight
        });
        setSyncBanner({
          title: `Ny ${p.typeLabel.toLowerCase()} inrapporterad`,
          detail: `${p.employeeName} · ${p.start} → ${p.end} · ${p.days} ${p.days === 1 ? "dag" : "dagar"}`,
          action: () => setActive("calendar"),
          actionLabel: "Visa i kalendern",
        });
        setTimeout(() => setSyncBanner(null), 8000);
      }

      if (msg.kind === "absence.approved") {
        const p = msg.payload;
        updateAbsence(p.id, { status: "godkand", arrivedAt: Date.now() });
        setSyncBanner({
          title: "Frånvaro attesterad",
          detail: `${p.employeeName}s ledighet har godkänts av chef`,
          action: () => setActive("calendar"),
          actionLabel: "Visa i kalendern",
        });
        setTimeout(() => setSyncBanner(null), 6000);
      }
    };
    return () => channel.close();
  }, [addAbsence, updateAbsence]);

  const askWatson = (question, context) => {
    setAiPrefill({ question, context, _ts: Date.now() }); // _ts ensures effect re-runs even on same question
    setAiOpen(true);
  };
  // expose globally so any nested component can call it without prop-drilling
  React.useEffect(() => {
    window.__askWatson = askWatson;
    return () => { delete window.__askWatson; };
  }, []);

  const handleSetActive = (id) => {
    setProfileId(null);
    setActive(id);
  };

  const handleAiClose = () => {
    setAiOpen(false);
    setAiPrefill(null);
  };

  const renderView = () => {
    if (profileId) {
      return <EmployeeProfile id={profileId} back={() => setProfileId(null)} />;
    }
    switch (active) {
      case "dashboard": return <Dashboard setActive={handleSetActive} />;
      case "payroll":   return <PayrollRun />;
      case "employees": return <Employees openProfile={(id) => setProfileId(id)} />;
      case "reports":   return <Reports />;
      case "settings":  return <Settings />;
      case "compliance": return <Compliance />;
      case "calendar": return <Calendar openProfile={(id) => setProfileId(id)} />;
      case "time": return <TimeReports openProfile={(id) => setProfileId(id)} />;
      default:          return <ComingSoon id={active} />;
    }
  };

  return (
    <div className="flex" style={{ minHeight: "100vh" }}>
      <Sidebar active={active} setActive={handleSetActive} openAi={() => { setAiPrefill(null); setAiOpen(true); }} />
      <main className="flex-1 min-w-0">
        {renderView()}
      </main>
      <AiAssistant open={aiOpen} close={handleAiClose}
        activeView={active}
        prefillQuestion={aiPrefill?.question}
        prefillContext={aiPrefill?.context} />
      <WatsonBanner />

      {/* Sphere sync banner — slides in from top when data arrives from Sphere */}
      {syncBanner && (
        <div className="fade-in" style={{
          position: "fixed",
          top: 24, right: 24,
          zIndex: 70,
          background: "white",
          borderRadius: 12,
          boxShadow: "0 12px 40px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.08)",
          border: "1px solid var(--line)",
          padding: "14px 16px",
          maxWidth: 380,
          display: "flex", alignItems: "flex-start", gap: 12,
        }}>
          <div style={{
            width: 34, height: 34, borderRadius: 9,
            background: "linear-gradient(135deg, #122121 0%, #1d3a35 100%)",
            color: "white",
            display: "flex", alignItems: "center", justifyContent: "center",
            flexShrink: 0,
          }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round">
              <rect x="6" y="3" width="12" height="18" rx="2.5" />
              <path d="M11 18h2" />
            </svg>
          </div>
          <div className="flex-1 min-w-0">
            <div className="flex items-center gap-1.5 mb-0.5">
              <span className="text-[10.5px] uppercase tracking-wider font-medium" style={{ color: "var(--ink-4)", letterSpacing: "0.06em" }}>
                Från Kontek Sphere
              </span>
              <span style={{ width: 5, height: 5, borderRadius: 3, background: "var(--success)", animation: "pulse 1.6s infinite" }} />
            </div>
            <div className="text-[13px] font-medium leading-snug" style={{ color: "var(--ink)" }}>{syncBanner.title}</div>
            <div className="text-[11.5px] mt-0.5" style={{ color: "var(--ink-3)" }}>{syncBanner.detail}</div>
            {syncBanner.action && (
              <button onClick={() => { syncBanner.action(); setSyncBanner(null); }}
                className="text-[11.5px] mt-2 font-medium flex items-center gap-1 hover:underline"
                style={{ color: "var(--ink-2)" }}>
                {syncBanner.actionLabel || "Visa"} →
              </button>
            )}
          </div>
          <button onClick={() => setSyncBanner(null)}
            className="p-1 rounded transition opacity-50 hover:opacity-100"
            style={{ color: "var(--ink-3)", flexShrink: 0 }}>
            <Icon name="x" size={13} />
          </button>
        </div>
      )}
    </div>
  );
};

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { err: null }; }
  static getDerivedStateFromError(err) { return { err }; }
  componentDidCatch(err, info) { console.error("[Kontek Next] Render error:", err, info); }
  render() {
    if (this.state.err) {
      return (
        <div style={{ padding: 40, fontFamily: "monospace", color: "#9B2222", whiteSpace: "pre-wrap" }}>
          <h2 style={{ fontFamily: "Inter, sans-serif", fontSize: 18, marginBottom: 12, color: "#0F1112" }}>Ett fel uppstod vid rendering</h2>
          <div style={{ fontSize: 13, color: "#0F1112", marginBottom: 12 }}>{this.state.err.message}</div>
          <pre style={{ fontSize: 11, color: "#6B6E68" }}>{this.state.err.stack}</pre>
          <button onClick={() => this.setState({ err: null })}
            style={{ marginTop: 16, padding: "8px 16px", background: "#203B3C", color: "white", border: "none", borderRadius: 8, cursor: "pointer" }}>
            Försök igen
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><SettingsProvider><EmployeeProvider><WatsonProvider><App /></WatsonProvider></EmployeeProvider></SettingsProvider></ErrorBoundary>
);
</script>
</body>
</html>
