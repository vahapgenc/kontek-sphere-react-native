const AiAssistant = ({ open, close, activeView, prefillQuestion, prefillContext }) => {
  const { actionsToday, actions } = useWatson();
  const [messages, setMessages] = useState([
    { role: "ai", text: { isIntro: true } },
  ]);
  const [input, setInput] = useState("");
  const [isThinking, setIsThinking] = useState(false);
  const [showActivity, setShowActivity] = useState(false);
  const inputRef = React.useRef(null);
  const scrollRef = React.useRef(null);

  // When opened with a prefilled question, auto-send it
  React.useEffect(() => {
    if (open && prefillQuestion) {
      // Slight delay so the drawer is mounted
      setTimeout(() => sendMessage(prefillQuestion, prefillContext), 300);
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [open, prefillQuestion]);

  // Auto-scroll to bottom on new message
  React.useEffect(() => {
    if (scrollRef.current) {
      scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
    }
  }, [messages, isThinking]);

  if (!open) return null;

  const suggestions = watsonContextSuggestions[activeView] || watsonContextSuggestions.default;

  const findResponse = (text) => {
    for (const r of WATSON_RESPONSES) {
      if (r.match(text)) return r.response;
    }
    return null;
  };

  const sendMessage = (text, context) => {
    const trimmed = text.trim();
    if (!trimmed) return;
    const userMsg = { role: "user", text: trimmed, context };
    setMessages(prev => [...prev, userMsg]);
    setInput("");
    setIsThinking(true);
    setTimeout(() => {
      const matched = findResponse(trimmed);
      if (matched) {
        setMessages(prev => [...prev, { role: "ai", text: matched }]);
      } else {
        setMessages(prev => [...prev, { role: "ai", text: {
          summary: "Jag förstår frågan men har inte ett färdigt underlag.",
          freeText: "I den fullständiga versionen söker jag i era lönedata, kollektivavtal och Skatteverkets regelverk för att ge dig ett konkret svar med källor. För prototypen kan jag visa hur jag svarar på frågor om Eriks övertid, OB-tillägg, semestertillägg, om körningen är säker, sjuklöner, AGI-rutiner och lönerevision.",
        }}]);
      }
      setIsThinking(false);
    }, 900);
  };

  const resetConversation = () => {
    setMessages([{ role: "ai", text: { isIntro: true } }]);
    setInput("");
  };

  const renderAiContent = (content) => {
    if (content.isIntro) {
      return (
        <div>
          <div className="text-[13px] leading-relaxed" style={{ color: "var(--ink-2)" }}>
            Hej Anna. Jag är Watson, din löneassistent. Jag hjälper dig genom lönekörningen med avvikelser, källor och förslag — men du tar alla beslut.
          </div>
          <div className="text-[12px] mt-2" style={{ color: "var(--ink-3)" }}>
            Just nu följer jag aprilkörningen. <span className="num">6</span> avvikelser hittade · <span className="num">2</span> behöver din åtgärd.
          </div>
        </div>
      );
    }
    if (content.freeText) {
      return (
        <div>
          <div className="text-[13px] leading-relaxed font-medium mb-1.5" style={{ color: "var(--ink)" }}>{content.summary}</div>
          <div className="text-[12.5px] leading-relaxed" style={{ color: "var(--ink-2)" }}>{content.freeText}</div>
        </div>
      );
    }
    // Structured response with ruling + sources + suggestion
    return (
      <div>
        <div className="text-[13px] leading-relaxed font-medium mb-2" style={{ color: "var(--ink)" }}>{content.summary}</div>
        {content.ruling && content.ruling.length > 0 && (
          <div className="space-y-1.5 mb-2.5">
            {content.ruling.map((line, i) => (
              <div key={i} className="flex items-start gap-2 text-[12.5px] leading-relaxed" style={{ color: "var(--ink-2)" }}>
                <span style={{ color: "var(--green)", marginTop: 2, fontSize: 10 }}>●</span>
                <span className="flex-1">{line}</span>
              </div>
            ))}
          </div>
        )}
        {content.sources && content.sources.length > 0 && (
          <div className="mt-2.5 mb-2.5 flex items-center flex-wrap gap-1.5">
            <span className="text-[10.5px] uppercase tracking-wider" style={{ color: "var(--ink-4)", letterSpacing: "0.06em" }}>Källor:</span>
            {content.sources.map((s, i) => (
              <span key={i} className="text-[11px] px-1.5 py-0.5 rounded-full inline-flex items-center gap-1"
                style={{ background: "white", border: "1px solid var(--line-2)", color: "var(--ink-2)" }}>
                <Icon name="link" size={9} strokeWidth={2} />
                {s.label}{s.ref && <span className="opacity-60"> · {s.ref}</span>}
              </span>
            ))}
          </div>
        )}
        {content.suggestion && (
          <div className="mt-2.5 px-3 py-2 rounded-lg flex items-start gap-2" style={{ background: "var(--green-soft)", border: "1px solid var(--success)" }}>
            <Icon name="sparkles" size={11} style={{ color: "var(--success-text)", marginTop: 3, flexShrink: 0 }} />
            <div className="text-[12px]" style={{ color: "var(--ink-2)" }}>
              <span className="font-medium" style={{ color: "var(--success-text)" }}>Watson föreslår:</span> {content.suggestion}
            </div>
          </div>
        )}
        {content.action && (
          <div className="mt-2.5 flex items-center gap-2">
            <WatsonExecuteButton
              label={content.action.label}
              target={content.action.target}
              detail={content.action.detail}
              size="small"
            />
            <button className="btn btn-ghost" style={{ padding: "6px 11px", fontSize: 12 }}>
              Hantera själv
            </button>
          </div>
        )}
      </div>
    );
  };

  return (
    <>
      <div className="fixed inset-0 z-40" style={{ background: "rgba(14, 20, 17, 0.4)" }} onClick={close} />
      <div className="fixed top-0 right-0 bottom-0 z-50 slide-in-right flex flex-col"
        style={{ width: 480, background: "white", borderLeft: "1px solid var(--line)" }}>
        {/* Header */}
        <div className="px-5 py-4 flex items-center justify-between" style={{ borderBottom: "1px solid var(--line)", background: "var(--ink)", color: "white" }}>
          <div className="flex items-center gap-3">
            <WatsonAvatar size={34} />
            <div>
              <div className="flex items-center gap-2">
                <div className="font-display text-[15px] font-medium">Watson</div>
                <span className="text-[10px] px-1.5 py-0.5 rounded uppercase tracking-wider font-medium"
                  style={{ background: "rgba(255,255,255,0.15)", color: "white", letterSpacing: "0.08em" }}>Agent</span>
              </div>
              <div className="text-[10.5px] opacity-60">Löneassistent · ser allt i ert lönesystem</div>
            </div>
          </div>
          <div className="flex items-center gap-1">
            <button onClick={resetConversation}
              title="Återställ konversationen"
              className="p-1.5 rounded hover:bg-white/10 transition" style={{ opacity: 0.8 }}>
              <Icon name="x" size={13} />
            </button>
            <button onClick={close} className="p-1.5 rounded hover:bg-white/10 transition">
              <Icon name="chevR" size={16} />
            </button>
          </div>
        </div>

        {/* Activity row */}
        {actionsToday > 0 && (
          <div style={{ background: "var(--bg-warm)", borderBottom: "1px solid var(--line)" }}>
            <button onClick={() => setShowActivity(!showActivity)}
              className="w-full px-5 py-2.5 flex items-center gap-2 text-left transition"
              onMouseEnter={e => e.currentTarget.style.background = "white"}
              onMouseLeave={e => e.currentTarget.style.background = "var(--bg-warm)"}
              style={{ background: "var(--bg-warm)" }}>
              <Icon name="sparkles" size={12} style={{ color: "var(--success-text)" }} />
              <span className="text-[12px] font-medium" style={{ color: "var(--ink)" }}>
                Watson har gjort <span className="num">{actionsToday}</span> {actionsToday === 1 ? "sak" : "saker"} åt dig idag
              </span>
              <Icon name={showActivity ? "chevU" : "chevD"} size={11} style={{ color: "var(--ink-3)", marginLeft: "auto" }} />
            </button>
            {showActivity && (
              <div className="px-5 py-2 fade-in" style={{ background: "white", borderTop: "1px solid var(--line-2)" }}>
                <div className="space-y-1.5">
                  {actions.slice(0, 8).map(a => (
                    <div key={a.id} className="flex items-start gap-2.5 py-1.5"
                      style={{ borderBottom: "1px solid var(--line-2)", opacity: a.undone ? 0.5 : 1 }}>
                      <Icon name={a.undone ? "x" : "check2"} size={11}
                        style={{ color: a.undone ? "var(--ink-4)" : "var(--success-text)", marginTop: 3, flexShrink: 0 }} />
                      <div className="flex-1">
                        <div className="text-[12px]" style={{
                          color: "var(--ink)",
                          textDecoration: a.undone ? "line-through" : "none",
                        }}>{a.label}</div>
                        <div className="text-[10.5px]" style={{ color: "var(--ink-4)" }}>
                          {a.ts.toLocaleTimeString("sv-SE", { hour: "2-digit", minute: "2-digit" })}
                          {a.undone && " · ångrat"}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}

        {/* Conversation */}
        <div ref={scrollRef} className="flex-1 overflow-y-auto px-5 py-5 space-y-4" style={{ background: "var(--bg)" }}>
          {messages.map((m, i) => {
            if (m.role === "ai") {
              return (
                <div key={i} className="flex gap-3 fade-in">
                  <WatsonAvatar size={28} />
                  <div className="rounded-xl px-3.5 py-2.5 max-w-[88%]" style={{ background: "white", border: "1px solid var(--line-2)" }}>
                    {renderAiContent(m.text)}
                  </div>
                </div>
              );
            }
            return (
              <div key={i} className="flex gap-3 flex-row-reverse fade-in">
                <div style={{
                  width: 28, height: 28, borderRadius: 14, flexShrink: 0,
                  background: "var(--green)",
                  color: "white",
                  display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 600,
                }}>AL</div>
                <div className="flex flex-col items-end max-w-[80%]">
                  {m.context && (
                    <div className="text-[10.5px] mb-1 px-2 py-0.5 rounded-full"
                      style={{ background: "var(--bg-warm)", color: "var(--ink-3)", border: "1px solid var(--line-2)" }}>
                      Kontext: {m.context}
                    </div>
                  )}
                  <div className="rounded-xl px-3.5 py-2.5 text-[13px] leading-relaxed"
                    style={{ background: "var(--green)", color: "white" }}>
                    {m.text}
                  </div>
                </div>
              </div>
            );
          })}

          {isThinking && (
            <div className="flex gap-3 fade-in">
              <WatsonAvatar size={28} />
              <div className="rounded-xl px-3.5 py-3 flex items-center gap-1" style={{ background: "white", border: "1px solid var(--line-2)" }}>
                <span style={{ width: 5, height: 5, borderRadius: "50%", background: "var(--ink-3)", animation: "pulse 1.4s infinite" }}></span>
                <span style={{ width: 5, height: 5, borderRadius: "50%", background: "var(--ink-3)", animation: "pulse 1.4s infinite 0.2s" }}></span>
                <span style={{ width: 5, height: 5, borderRadius: "50%", background: "var(--ink-3)", animation: "pulse 1.4s infinite 0.4s" }}></span>
              </div>
            </div>
          )}

          {messages.length === 1 && !isThinking && (
            <div className="pt-4 mt-2" style={{ borderTop: "1px solid var(--line-2)" }}>
              <div className="eyebrow mb-3">Förslag baserat på var du är</div>
              <div className="space-y-2">
                {suggestions.map((s, i) => (
                  <button key={i} onClick={() => sendMessage(s)}
                    className="w-full text-left px-3 py-2.5 rounded-lg text-[12.5px] transition flex items-start gap-2"
                    style={{ background: "white", border: "1px solid var(--line-2)", color: "var(--ink-2)" }}
                    onMouseEnter={e => { e.currentTarget.style.borderColor = "var(--ink-4)"; e.currentTarget.style.background = "var(--bg-warm)"; }}
                    onMouseLeave={e => { e.currentTarget.style.borderColor = "var(--line-2)"; e.currentTarget.style.background = "white"; }}>
                    <Icon name="sparkles" size={11} style={{ color: "var(--ink-4)", marginTop: 2, flexShrink: 0 }} />
                    <span className="flex-1">{s}</span>
                  </button>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* Input */}
        <div className="px-5 py-4" style={{ borderTop: "1px solid var(--line)", background: "white" }}>
          <div className="flex items-center gap-2 px-3 py-2.5 rounded-lg" style={{ background: "var(--bg-warm)", border: "1px solid var(--line)" }}>
            <input ref={inputRef} value={input} onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key === "Enter" && sendMessage(input)}
              placeholder="Fråga Watson om allt — avtal, körningar, anställda..."
              className="flex-1 bg-transparent outline-none text-[13px]" />
            <button onClick={() => sendMessage(input)} className="p-1.5 rounded transition hover:opacity-70" style={{ background: "var(--ink)", color: "white" }}>
              <Icon name="send" size={13} />
            </button>
          </div>
          <div className="text-[10.5px] mt-2 text-center" style={{ color: "var(--ink-4)" }}>
            Watson använder er lönedata, svenska kollektivavtal och Skatteverkets regelverk.
          </div>
        </div>
      </div>
    </>
  );
};

const SettingsContext = React.createContext(null);
const useSettings = () => React.useContext(SettingsContext);

const SettingsProvider = ({ children }) => {
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);

  // Domain lists that live with settings so they're consistent everywhere
  const [schedules, setSchedules] = useState(() => SCHEDULE_TEMPLATES);
  const [holidaySchemes, setHolidaySchemes] = useState(() => HOLIDAY_SCHEMES);
  const [wageTypes, setWageTypes] = useState(() => WAGE_TYPES);
  const [agreements, setAgreements] = useState(() => COLLECTIVE_AGREEMENTS);

  const update = (patch) => setSettings(s => ({ ...s, ...patch }));
  const updateIntegration = (key, val) =>
    setSettings(s => ({ ...s, integrations: { ...s.integrations, [key]: val } }));
  const updateVacation = (code, patch) =>
    setSettings(s => ({
      ...s,
      vacationConditions: {
        ...s.vacationConditions,
        [code]: { ...s.vacationConditions[code], ...patch },
      },
    }));
  return (
    <SettingsContext.Provider value={{
      settings, update, updateIntegration, updateVacation,
      schedules, setSchedules,
      holidaySchemes, setHolidaySchemes,
      wageTypes, setWageTypes,
      agreements, setAgreements,
    }}>
      {children}
    </SettingsContext.Provider>
  );
};

const WAGE_GROUPS = ["Lön", "Förmån", "Manuell prel.skatt", "Sjuk", "Semester", "Övrig frånvaro", "Tid", "Nettoersättning", "Nettoavdrag", "Övrigt", "System"];

const SettingsWageTypes = ({ wageTypes, setWageTypes }) => {
  const [query, setQuery] = useState("");
  const [catFilter, setCatFilter] = useState("Alla");
  const [groupFilter, setGroupFilter] = useState("Alla");
  const [page, setPage] = useState(1);
  const [copyTarget, setCopyTarget] = useState(null);
  const [editTarget, setEditTarget] = useState(null);
  const [justAdded, setJustAdded] = useState(null);
  const [justDeleted, setJustDeleted] = useState(null);
  const PER_PAGE = 25;

  const handleSaveCopy = (newWageType) => {
    setWageTypes(list => [newWageType, ...list]);
    setCopyTarget(null);
    setQuery("");
    setCatFilter("Alla");
    setGroupFilter("Alla");
    setPage(1);
    setJustAdded(newWageType.code);
    setTimeout(() => setJustAdded(null), 2400);
  };

  const handleSaveEdit = (updated) => {
    setWageTypes(list => list.map(w => w.code === editTarget.code ? { ...w, ...updated } : w));
    setEditTarget(null);
  };

  const handleDelete = (code) => {
    setWageTypes(list => list.filter(w => w.code !== code));
    setJustDeleted(code);
    setTimeout(() => setJustDeleted(null), 2400);
  };

  const filtered = wageTypes.filter(w => {
    const q = query.trim().toLowerCase();
    const matchQ = !q || w.code.includes(q) || w.name.toLowerCase().includes(q) || w.typ.toLowerCase().includes(q);
    const matchCat = catFilter === "Alla" || w.cat.includes(catFilter === "Tjänsteman" ? "Tjänste" : catFilter);
    const matchGroup = groupFilter === "Alla" || w.group === groupFilter;
    return matchQ && matchCat && matchGroup;
  });

  // Reset to page 1 whenever filters change the result set
  const totalPages = Math.max(1, Math.ceil(filtered.length / PER_PAGE));
  const curPage = Math.min(page, totalPages);
  const pageRows = filtered.slice((curPage - 1) * PER_PAGE, curPage * PER_PAGE);

  const resetPage = (fn) => (v) => { fn(v); setPage(1); };

  const toneFor = (g) => {
    if (g === "Sjuk" || g === "Övrig frånvaro" || g === "Nettoavdrag" || g === "Manuell prel.skatt") return "rust";
    if (g === "Förmån") return "blue";
    if (g === "Semester" || g === "Nettoersättning") return "amber";
    if (g === "System") return "neutral";
    return "neutral";
  };

  return (
    <div>
      <h3 className="font-display text-[15px] font-medium mb-0.5">Lönearter</h3>
      <p className="text-[11.5px] mb-3" style={{ color: "var(--ink-3)" }}>
        Företagets lönearter enligt svensk standard. Varje art styr beräkning, personalkategori, löneform och bokföring.
      </p>

      {justAdded && (
        <div className="fade-in mb-3 px-4 py-2.5 rounded-lg flex items-center gap-2.5"
          style={{ background: "var(--green-soft)", border: "1px solid var(--success)" }}>
          <Icon name="check2" size={14} strokeWidth={2.4} style={{ color: "var(--success-text)" }} />
          <span className="text-[12.5px]" style={{ color: "var(--success-text)" }}>
            Löneart <span className="num font-medium">{justAdded}</span> är skapad och tillagd överst i listan.
          </span>
        </div>
      )}

      {justDeleted && (
        <div className="fade-in mb-3 px-4 py-2.5 rounded-lg flex items-center gap-2.5"
          style={{ background: "var(--bg-warm)", border: "1px solid var(--line)" }}>
          <Icon name="check2" size={14} strokeWidth={2.4} style={{ color: "var(--ink-3)" }} />
          <span className="text-[12.5px]" style={{ color: "var(--ink-2)" }}>
            Löneart <span className="num font-medium">{justDeleted}</span> är borttagen.
          </span>
        </div>
      )}

      {/* Filters */}
      <div className="flex items-center gap-2 mb-3">
        <div className="flex items-center gap-2 px-3 py-1.5 rounded-lg flex-1"
          style={{ background: "white", border: "1px solid var(--line)", maxWidth: 260 }}>
          <Icon name="search" size={13} style={{ color: "var(--ink-4)" }} />
          <input value={query} onChange={e => { setQuery(e.target.value); setPage(1); }}
            placeholder="Sök kod, benämning eller typ"
            className="text-[12.5px] outline-none flex-1"
            style={{ background: "transparent", color: "var(--ink)" }} />
        </div>
        <SettingSelect value={groupFilter}
          options={["Alla", ...WAGE_GROUPS]}
          onChange={resetPage(setGroupFilter)} width={190} />
        <SettingSelect value={catFilter}
          options={["Alla", "Tjänsteman", "Arbetare"]}
          onChange={resetPage(setCatFilter)} width={140} />
        <span className="text-[11.5px] num ml-auto" style={{ color: "var(--ink-4)" }}>
          {filtered.length} lönearter
        </span>
      </div>

      <div className="card overflow-hidden">
        <div className="grid items-center px-5 py-2.5 text-[10.5px] uppercase tracking-wider font-medium"
          style={{ gridTemplateColumns: "60px 1.7fr 1.7fr 150px 130px 70px 96px", columnGap: 20, color: "var(--ink-3)", background: "var(--bg-warm)", borderBottom: "1px solid var(--line)", letterSpacing: "0.06em" }}>
          <div>Kod</div><div>Benämning</div><div>Typ</div><div>Personalkategori</div><div>Löneform</div><div>Standard</div><div className="text-right">Åtgärd</div>
        </div>
        {pageRows.length === 0 && (
          <div className="px-5 py-10 text-center text-[12.5px]" style={{ color: "var(--ink-4)" }}>
            Inga lönearter matchar filtret.
          </div>
        )}
        {pageRows.map((w, i) => (
          <div key={w.code}
            onClick={() => setEditTarget(w)}
            className="grid items-center px-5 py-2.5 row-hover cursor-pointer transition"
            style={{
              gridTemplateColumns: "60px 1.7fr 1.7fr 150px 130px 70px 96px",
              columnGap: 20,
              borderBottom: i === pageRows.length - 1 ? "none" : "1px solid var(--line-2)",
              background: justAdded === w.code ? "var(--green-soft)" : undefined,
            }}>
            <div className="text-[12px] num" style={{ color: "var(--ink-3)" }}>{w.code}</div>
            <div className="text-[12.5px] font-medium truncate">{w.name}</div>
            <div className="text-[12px] truncate flex items-center gap-1.5">
              <Pill tone={toneFor(w.group)}>{w.group}</Pill>
              <span style={{ color: "var(--ink-4)" }} className="truncate">{w.typ.split(" - ").slice(1).join(" · ")}</span>
            </div>
            <div className="text-[12px]" style={{ color: "var(--ink-3)" }}>{w.cat}</div>
            <div className="text-[12px]" style={{ color: "var(--ink-3)" }}>{w.form}</div>
            <div className="text-[12px]" style={{ color: w.std ? "var(--ink-2)" : "var(--ink-4)" }}>{w.std ? "Ja" : "Nej"}</div>
            <div className="flex items-center justify-end gap-0.5">
              <button title="Kopiera löneart"
                onClick={(e) => { e.stopPropagation(); setCopyTarget(w); }}
                className="flex items-center gap-1.5 px-2 py-1 rounded text-[11.5px] transition"
                style={{ color: "var(--ink-4)" }}
                onMouseEnter={e => { e.currentTarget.style.background = "var(--green-soft)"; e.currentTarget.style.color = "var(--green-2)"; }}
                onMouseLeave={e => { e.currentTarget.style.background = "transparent"; e.currentTarget.style.color = "var(--ink-4)"; }}>
                <Icon name="copy" size={13} />
                <span className="copy-label" style={{ maxWidth: 0, overflow: "hidden", whiteSpace: "nowrap", transition: "max-width 0.2s ease" }}>Kopiera</span>
              </button>
              {!w.std && (
                <DeleteButton onConfirm={(e) => { e.stopPropagation(); handleDelete(w.code); }} code={w.code} />
              )}
            </div>
          </div>
        ))}
      </div>

      {/* Pagination */}
      <div className="flex items-center justify-between mt-3">
        <button className="text-[12.5px] flex items-center gap-1.5 hover:opacity-70 transition" style={{ color: "var(--green)" }}>
          <Icon name="plus" size={12} strokeWidth={2.2} /> Lägg till löneart
        </button>
        {totalPages > 1 && (
          <div className="flex items-center gap-1">
            <PageBtn disabled={curPage === 1} onClick={() => setPage(1)} icon="chevLL" />
            <PageBtn disabled={curPage === 1} onClick={() => setPage(curPage - 1)} icon="chevL" />
            <span className="text-[12px] num px-3" style={{ color: "var(--ink-3)" }}>
              Sida {curPage} av {totalPages}
            </span>
            <PageBtn disabled={curPage === totalPages} onClick={() => setPage(curPage + 1)} icon="chevR" />
            <PageBtn disabled={curPage === totalPages} onClick={() => setPage(totalPages)} icon="chevRR" />
          </div>
        )}
      </div>

      {copyTarget && (
        <WageTypeEditor mode="copy" source={copyTarget}
          existingCodes={wageTypes.map(w => w.code)}
          onSave={handleSaveCopy}
          onClose={() => setCopyTarget(null)} />
      )}

      {editTarget && (
        <WageTypeEditor mode="edit" source={editTarget}
          existingCodes={wageTypes.map(w => w.code).filter(c => c !== editTarget.code)}
          readOnly={editTarget.std}
          onSave={handleSaveEdit}
          onClose={() => setEditTarget(null)} />
      )}
    </div>
  );
};

  const [confirming, setConfirming] = useState(false);

  React.useEffect(() => {
    if (!confirming) return;
    const t = setTimeout(() => setConfirming(false), 3000);
    return () => clearTimeout(t);
  }, [confirming]);

  if (!confirming) {
    return (
      <button title="Radera löneart"
        onClick={(e) => { e.stopPropagation(); setConfirming(true); }}
        className="flex items-center px-2 py-1 rounded text-[11.5px] transition"
        style={{ color: "var(--ink-4)" }}
        onMouseEnter={e => { e.currentTarget.style.background = "rgba(176,67,27,0.10)"; e.currentTarget.style.color = "var(--rust)"; }}

        <Icon name="trash" size={13} />
      </button>
    );
  }
  return (
    <button onClick={onConfirm}
      className="flex items-center gap-1.5 px-2 py-1 rounded text-[11.5px] transition fade-in"
      style={{ background: "var(--rust)", color: "white", fontWeight: 500 }}>

    </button>
  );
};

const WageTypeEditor = ({ mode = "copy", source, existingCodes = [], readOnly = false, onSave, onClose }) => {
  const isEdit = mode === "edit";
  const [tab, setTab] = useState("grund");
  const [codeError, setCodeError] = useState("");
  const cats = source.cat.split(", ");
  const forms = source.form.split(", ");

  // Suggested code: copy mode -> append 0; edit mode -> keep source code
  const suggestedCode = (() => {
    if (isEdit) return source.code;
    const taken = new Set(existingCodes);
    let candidate = source.code + "0";
    let last = 0;
    while (taken.has(candidate) && last < 9) {
      last++;
      candidate = source.code + String(last);
    }
    return candidate;
  })();

  const [form, setForm] = useState({
    code: suggestedCode,
    name: isEdit ? source.name : source.name + " (kopia)",
    enhet: "Timmar",
    skatt: "Tabellskatt",
    agi: "011/131 — Kontant ersättning",
    agiSink: "011/131 — Kontant ersättning",
    formula: source.name,
    showAs: "summa",
    catArbetare: cats.includes("Arbetare") || source.cat.includes("Arbetare"),
    catTjm: source.cat.includes("Tjänste"),
    formMonth: forms.some(f => f.includes("Månad")),
    formHour: forms.some(f => f.includes("Tim")),
    uArbTid: true, uAga: true, uFora: true, uUtgifter: true,
    uSemLon: true, uSemRorlig: false, uSemTid: true, uSemFranvaro: false,
    statBygglosen: "Arbetad tid och Lönesumma (bruttolön)",
    atfTid: true, atfFranvaro: false, atkTid: true, atkLon: true,
    showOnPayslip: true,
    personalAccount: true,
    accArb: "7010 — Löner till kollektivanställda",
    accTjm: "7210 — Löner till tjänstemän",
    description: "",
    notes: "",
  });
  const set = (patch) => { setForm(f => ({ ...f, ...patch })); if (patch.code !== undefined) setCodeError(""); };

  const handleSave = () => {
    const code = form.code.trim();
    // Validate: 4 digits, not already in use
    if (!/^\d{3,5}$/.test(code)) {
      setCodeError("Ange en giltig löneartskod (3–5 siffror).");
      setTab("grund");
      return;
    }
    if (existingCodes.includes(code)) {
      setCodeError("Löneartskoden används redan. Välj en annan.");
      setTab("grund");
      return;
    }
    if (!form.name.trim()) {
      setCodeError("Ange en benämning.");
      setTab("grund");
      return;
    }
    // Build cat/form strings
    const catParts = [];
    if (form.catTjm) catParts.push("Tjänstemän");
    if (form.catArbetare) catParts.push("Arbetare");
    const formParts = [];
    if (form.formMonth) formParts.push("Månadslön");
    if (form.formHour) formParts.push("Timlön");

    onSave({
      code,
      name: form.name.trim(),
      group: source.group,
      typ: source.typ,
      cat: catParts.join(", ") || source.cat,
      form: formParts.join(", ") || source.form,
      std: false, // copies are not "Standard"
    });
  };

  const TABS = [
    { id: "grund", label: "Grunduppgifter" },
    { id: "ovriga", label: "Övriga uppgifter" },
    { id: "egna", label: "Egna inställningar" },
  ];

  return (
    <div className="fixed inset-0 flex items-center justify-center fade-in"
      style={{ background: "rgba(15,17,18,0.55)", zIndex: 100, padding: 32 }}
      onClick={onClose}>
      <div className="rounded-xl overflow-hidden flex flex-col"
        style={{ background: "var(--bg)", width: 920, maxHeight: "90vh", boxShadow: "0 24px 60px rgba(0,0,0,0.3)" }}
        onClick={e => e.stopPropagation()}>

        {/* Header */}
        <div className="px-6 py-4 flex items-center justify-between" style={{ borderBottom: "1px solid var(--line)", background: "white" }}>
          <div>
            <div className="eyebrow mb-0.5" style={{ color: readOnly ? "var(--ink-4)" : "var(--green)" }}>
              {readOnly ? "Visa standardlöneart" : (isEdit ? "Redigera löneart" : "Kopiera löneart")}
            </div>
            <h2 className="font-display text-[17px] font-medium">{source.code} · {source.name}</h2>
          </div>
          <button onClick={onClose} className="p-1.5 rounded-lg hover:bg-gray-100 transition" style={{ color: "var(--ink-3)" }}>
            <Icon name="x" size={16} />
          </button>
        </div>

        {/* Tabs */}
        <div className="flex px-6 gap-1" style={{ borderBottom: "1px solid var(--line)", background: "white" }}>
          {TABS.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)}
              className="px-4 py-2.5 text-[13px] transition relative"
              style={{ color: tab === t.id ? "var(--green-2)" : "var(--ink-3)", fontWeight: tab === t.id ? 500 : 400 }}>
              {t.label}
              {tab === t.id && <div style={{ position: "absolute", left: 8, right: 8, bottom: -1, height: 2, background: "var(--green)", borderRadius: 2 }} />}
            </button>
          ))}
        </div>

        {/* Body */}
        <div className="px-6 py-5 overflow-y-auto" style={{ flex: 1 }}>
          {readOnly && (
            <div className="mb-4 px-4 py-2.5 rounded-lg flex items-center gap-2.5"
              style={{ background: "var(--bg-warm)", border: "1px solid var(--line)" }}>
              <Icon name="info" size={14} style={{ color: "var(--ink-3)" }} />
              <span className="text-[12px]" style={{ color: "var(--ink-2)" }}>
                Det här är en standardlöneart och kan inte ändras direkt. Använd <span style={{ fontWeight: 500 }}>Kopiera</span> i listan om du behöver en variant.
              </span>
            </div>
          )}
          <div style={{ pointerEvents: readOnly ? "none" : "auto", opacity: readOnly ? 0.7 : 1 }}>
          {tab === "grund" && (
            <div className="grid grid-cols-2 gap-x-10">
              <div>
                <WTField label="Löneart">
                  <div className="flex flex-col gap-1">
                    <SettingInput value={form.code} onChange={v => set({ code: v })} width={150} />
                    {codeError && (
                      <span className="text-[11px]" style={{ color: "var(--rust)" }}>{codeError}</span>
                    )}
                  </div>
                </WTField>
                <WTField label="Benämning">
                  <SettingInput value={form.name} onChange={v => set({ name: v })} width="100%" />
                </WTField>
                <WTField label="Typ">
                  <span className="text-[12.5px]" style={{ color: "var(--ink-2)" }}>{source.typ}</span>
                </WTField>
                <WTField label="Enhet">
                  <SettingSelect value={form.enhet} options={["Timmar", "Dagar", "Styck", "Kronor", "Procent"]}
                    onChange={v => set({ enhet: v })} width="100%" />
                </WTField>
                <WTField label="Skatt">
                  <SettingSelect value={form.skatt} options={["Tabellskatt", "Engångsskatt", "Ingen skatt"]}
                    onChange={v => set({ skatt: v })} width="100%" />
                </WTField>
                <WTField label="Ruta AGI">
                  <SettingSelect value={form.agi}
                    options={["011/131 — Kontant ersättning", "012/132 — Förmåner", "—"]}
                    onChange={v => set({ agi: v })} width="100%" />
                </WTField>
                <WTField label="Ruta AGI SINK">

                </WTField>

                <div className="text-[12px] uppercase tracking-wider font-medium mt-5 mb-2" style={{ color: "var(--ink-4)", letterSpacing: "0.06em" }}>Beräkning på lönebesked</div>
                <WTField label="Formel">
                  <SettingInput value={form.formula} onChange={v => set({ formula: v })} width="100%" />
                </WTField>
                <WTField label="Visa resultat">
                  <SettingRadioGroup value={form.showAs}
                    options={[{ value: "apris", label: "À-pris" }, { value: "summa", label: "Summa" }]}
                    onChange={v => set({ showAs: v })} />
                </WTField>
              </div>

              <div>
                <div className="grid grid-cols-2 gap-4 mb-5">
                  <div>
                    <div className="text-[12px] uppercase tracking-wider font-medium mb-2" style={{ color: "var(--ink-4)", letterSpacing: "0.06em" }}>Personalkategori</div>
                    <div className="space-y-2">
                      <WT_CHECK checked={form.catArbetare} onChange={v => set({ catArbetare: v })} label="Arbetare" />
                      <WT_CHECK checked={form.catTjm} onChange={v => set({ catTjm: v })} label="Tjänstemän" />
                    </div>
                  </div>
                  <div>
                    <div className="text-[12px] uppercase tracking-wider font-medium mb-2" style={{ color: "var(--ink-4)", letterSpacing: "0.06em" }}>Löneform</div>
                    <div className="space-y-2">
                      <WT_CHECK checked={form.formMonth} onChange={v => set({ formMonth: v })} label="Månadslön" />
                      <WT_CHECK checked={form.formHour} onChange={v => set({ formHour: v })} label="Timlön" />
                    </div>
                  </div>
                </div>

                <div className="text-[12px] uppercase tracking-wider font-medium mb-2" style={{ color: "var(--ink-4)", letterSpacing: "0.06em" }}>Påverkar underlag för</div>
                <div className="space-y-2 mb-5">
                  <WT_CHECK checked={form.uArbTid} onChange={v => set({ uArbTid: v })} label="Arbetad tid" />
                  <WT_CHECK checked={form.uAga} onChange={v => set({ uAga: v })} label="Arbetsgivaravgift" />
                  <WT_CHECK checked={form.uFora} onChange={v => set({ uFora: v })} label="Rapportering till Fora" />
                  <WT_CHECK checked={form.uUtgifter} onChange={v => set({ uUtgifter: v })} label="Avdrag för utgifter i arbetet" />
                  <WT_CHECK checked={form.uSemLon} onChange={v => set({ uSemLon: v })} label="Semestergrundande lön" />
                  <WT_CHECK checked={form.uSemRorlig} onChange={v => set({ uSemRorlig: v })} label="Semestergrundande rörlig lön" />
                  <WT_CHECK checked={form.uSemTid} onChange={v => set({ uSemTid: v })} label="Semestergrundande tid" />
                  <WT_CHECK checked={form.uSemFranvaro} onChange={v => set({ uSemFranvaro: v })} label="Semestergrundande frånvaro" />

                    onChange={() => {}} width={420} />
                  <SettingInput value="0,00" onChange={() => {}} suffix="%" width={110} />
                  <button className="p-1.5 rounded-lg transition" style={{ border: "1px solid var(--line)", background: "white", color: "var(--green)" }}>

const SettingsSchedules = ({ settings, set, schedules, setSchedules, holidaySchemes, setHolidaySchemes }) => {
  const [tab, setTab] = useState("schedules");
  const [editTarget, setEditTarget] = useState(null);
  const [createMode, setCreateMode] = useState(null); // "schedule" | "holiday" | null
  const [showMembers, setShowMembers] = useState(null);
  const [sortDir, setSortDir] = useState("asc");
  const [justAdded, setJustAdded] = useState(null);
  const [justDeleted, setJustDeleted] = useState(null);

  const sortedSchedules = [...schedules].sort((a, b) =>
    sortDir === "asc" ? a.name.localeCompare(b.name, "sv") : b.name.localeCompare(a.name, "sv")
  );

  const handleSaveEdit = (updated) => {
    setSchedules(list => list.map(s => s.id === editTarget.id ? { ...s, ...updated } : s));
    setEditTarget(null);
  };

  const handleCreateSchedule = (newSchedule) => {
    const id = "custom-" + Date.now();
    const created = { id, count: 0, ...newSchedule };
    setSchedules(list => [...list, created]);
    setCreateMode(null);
    setJustAdded(id);
    setTimeout(() => setJustAdded(null), 2400);
  };

  const handleCreateHoliday = (newScheme) => {
    const id = "custom-" + Date.now();
    const created = { id, count: 0, ...newScheme };
    setHolidaySchemes(list => [...list, created]);
    setCreateMode(null);
    setJustAdded(id);
    setTimeout(() => setJustAdded(null), 2400);
  };

  const handleDeleteSchedule = (id) => {
    setSchedules(list => list.filter(s => s.id !== id));
    setJustDeleted(id);
    setTimeout(() => setJustDeleted(null), 2400);
  };

  const handleDeleteHoliday = (id) => {
    setHolidaySchemes(list => list.filter(h => h.id !== id));
    setJustDeleted(id);
    setTimeout(() => setJustDeleted(null), 2400);
  };

  return (
    <div>
      <h3 className="font-display text-[15px] font-medium mb-0.5">Arbetsscheman</h3>
      <p className="text-[11.5px] mb-3" style={{ color: "var(--ink-3)" }}>
        Schemamallar som kopplas till anställda. Helgdagar hanteras separat och påverkar lönekörning och frånvarokalender.
      </p>

      <SettingsGroup title="Standardschema" desc="Tilldelas nya anställda automatiskt om inget annat anges.">
        <SettingRow label="Standardschema" last>
          <SettingSelect value={settings.defaultSchedule}
            options={schedules.map(s => s.name)}
            onChange={v => set({ defaultSchedule: v })} width={290} />
        </SettingRow>
      </SettingsGroup>

      {justAdded && (
        <div className="fade-in mb-3 px-4 py-2.5 rounded-lg flex items-center gap-2.5"
          style={{ background: "var(--green-soft)", border: "1px solid var(--success)" }}>
          <Icon name="check2" size={14} strokeWidth={2.4} style={{ color: "var(--success-text)" }} />
          <span className="text-[12.5px]" style={{ color: "var(--success-text)" }}>
            Schemat är skapat och tillagt i listan.
          </span>
        </div>
      )}

      {justDeleted && (
        <div className="fade-in mb-3 px-4 py-2.5 rounded-lg flex items-center gap-2.5"
          style={{ background: "var(--bg-warm)", border: "1px solid var(--line)" }}>
          <Icon name="check2" size={14} strokeWidth={2.4} style={{ color: "var(--ink-3)" }} />
          <span className="text-[12.5px]" style={{ color: "var(--ink-2)" }}>
            Schemat är borttaget.
          </span>
        </div>
      )}

      {/* Tabs */}
      <div className="flex gap-1.5 mb-3">
        <button onClick={() => setTab("schedules")}
          className="px-3 py-1.5 rounded-full text-[12px] transition"
          style={{
            background: tab === "schedules" ? "var(--green-soft)" : "white",
            color: tab === "schedules" ? "var(--green-2)" : "var(--ink-2)",
            border: "1px solid " + (tab === "schedules" ? "var(--green)" : "var(--line)"),
            fontWeight: tab === "schedules" ? 500 : 400,
          }}>
          Arbetsscheman
        </button>
        <button onClick={() => setTab("holidays")}
          className="px-3 py-1.5 rounded-full text-[12px] transition"
          style={{
            background: tab === "holidays" ? "var(--green-soft)" : "white",
            color: tab === "holidays" ? "var(--green-2)" : "var(--ink-2)",
            border: "1px solid " + (tab === "holidays" ? "var(--green)" : "var(--line)"),
            fontWeight: tab === "holidays" ? 500 : 400,
          }}>
          Helgdagsscheman
        </button>
      </div>

      {tab === "schedules" && (
        <div className="card overflow-hidden">
          <div className="grid items-center px-5 py-2.5 text-[10.5px] uppercase tracking-wider font-medium"
            style={{ gridTemplateColumns: "1fr 110px 122px", columnGap: 20, color: "var(--ink-3)", background: "var(--bg-warm)", borderBottom: "1px solid var(--line)", letterSpacing: "0.06em" }}>
            <div>Benämning</div>
            <button onClick={() => setSortDir(sortDir === "asc" ? "desc" : "asc")}
              className="flex items-center gap-1 text-left hover:opacity-70 transition">
              Anställda <Icon name={sortDir === "asc" ? "chevU" : "chevD"} size={11} />
            </button>
            <div className="text-right">Åtgärd</div>
          </div>
          {sortedSchedules.map((s, i, arr) => (
            <div key={s.id}
              onClick={() => setEditTarget(s)}
              className="grid items-center px-5 py-3 row-hover cursor-pointer transition"
              style={{
                gridTemplateColumns: "1fr 110px 122px",
                columnGap: 20,
                borderBottom: i === arr.length - 1 ? "none" : "1px solid var(--line-2)",
                background: justAdded === s.id ? "var(--green-soft)" : undefined,
              }}>
              <div className="text-[13px] font-medium">{s.name}</div>
              <div className="text-[12.5px] num" style={{ color: "var(--ink-2)" }}>{s.count}</div>
              <div className="flex items-center justify-end gap-0.5">
                <button title="Visa kopplade anställda"
                  onClick={(e) => { e.stopPropagation(); setShowMembers(s); }}
                  className="p-1.5 rounded transition opacity-50 hover:opacity-100"
                  style={{ color: "var(--ink-3)" }}
                  onMouseEnter={e => { e.currentTarget.style.background = "var(--bg-warm)"; }}
                  onMouseLeave={e => { e.currentTarget.style.background = "transparent"; }}>
                  <Icon name="users" size={13} />
                </button>
                <button title="Koppla anställd till schema"
                  onClick={(e) => e.stopPropagation()}
                  className="p-1.5 rounded transition opacity-50 hover:opacity-100"
                  style={{ color: "var(--ink-3)" }}
                  onMouseEnter={e => { e.currentTarget.style.background = "var(--green-soft)"; e.currentTarget.style.color = "var(--green-2)"; }}
                  onMouseLeave={e => { e.currentTarget.style.background = "transparent"; e.currentTarget.style.color = "var(--ink-3)"; }}>
                  <Icon name="userPlus" size={13} />
                </button>
                {s.count === 0 ? (
                  <DeleteButton onConfirm={(e) => { e.stopPropagation(); handleDeleteSchedule(s.id); }} code={s.id} />
                ) : (
                  <button title={"Kan inte raderas — " + s.count + " anställd" + (s.count === 1 ? "" : "a") + " är kopplade"}
                    onClick={(e) => e.stopPropagation()}
                    className="p-1.5 rounded transition"
                    style={{ color: "var(--ink-4)", opacity: 0.3, cursor: "not-allowed" }}>
                    <Icon name="trash" size={13} />
                  </button>
                )}
              </div>
            </div>
          ))}
        </div>
      )}

      {tab === "holidays" && (
        <div className="card overflow-hidden">
          <div className="grid items-center px-5 py-2.5 text-[10.5px] uppercase tracking-wider font-medium"
            style={{ gridTemplateColumns: "1fr 110px 122px", columnGap: 20, color: "var(--ink-3)", background: "var(--bg-warm)", borderBottom: "1px solid var(--line)", letterSpacing: "0.06em" }}>
            <div>Benämning</div>
            <div>Kopplade scheman</div>
            <div className="text-right">Åtgärd</div>
          </div>
          {holidaySchemes.map((h, i, arr) => (
            <div key={h.id} className="px-5 py-3 row-hover cursor-pointer transition"
              style={{
                borderBottom: i === arr.length - 1 ? "none" : "1px solid var(--line-2)",
                background: justAdded === h.id ? "var(--green-soft)" : undefined,
              }}>
              <div className="grid items-center" style={{ gridTemplateColumns: "1fr 110px 122px", columnGap: 20 }}>
                <div>
                  <div className="text-[13px] font-medium">{h.name}</div>
                  <div className="text-[11px] mt-0.5 truncate" style={{ color: "var(--ink-4)" }} title={h.includes}>{h.includes}</div>
                </div>
                <div className="text-[12.5px] num" style={{ color: "var(--ink-2)" }}>{h.count}</div>
                <div className="flex items-center justify-end gap-0.5">
                  <button className="p-1.5 rounded transition opacity-50 hover:opacity-100"
                    style={{ color: "var(--ink-3)" }}
                    onMouseEnter={e => { e.currentTarget.style.background = "var(--bg-warm)"; }}
                    onMouseLeave={e => { e.currentTarget.style.background = "transparent"; }}>
                    <Icon name="calendar" size={13} />
                  </button>
                  {h.count === 0 ? (
                    <DeleteButton onConfirm={(e) => { e.stopPropagation(); handleDeleteHoliday(h.id); }} code={h.id} />
                  ) : (
                    <button title={"Kan inte raderas — " + h.count + " schema" + (h.count === 1 ? "" : "n") + " använder detta"}
                      onClick={(e) => e.stopPropagation()}
                      className="p-1.5 rounded transition"
                      style={{ color: "var(--ink-4)", opacity: 0.3, cursor: "not-allowed" }}>
                      <Icon name="trash" size={13} />
                    </button>
                  )}
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      <button onClick={() => setCreateMode(tab === "schedules" ? "schedule" : "holiday")}
        className="mt-3 text-[12.5px] flex items-center gap-1.5 hover:opacity-70 transition" style={{ color: "var(--green)" }}>
        <Icon name="plus" size={12} strokeWidth={2.2} /> {tab === "schedules" ? "Lägg till arbetsschema" : "Lägg till helgdagsschema"}
      </button>

      {editTarget && <ScheduleEditor schedule={editTarget} onSave={handleSaveEdit} onClose={() => setEditTarget(null)} />}
      {createMode === "schedule" && <ScheduleEditor mode="create" onSave={handleCreateSchedule} onClose={() => setCreateMode(null)} />}
      {createMode === "holiday" && <HolidaySchemeEditor onSave={handleCreateHoliday} onClose={() => setCreateMode(null)} />}
      {showMembers && <ScheduleMembersModal schedule={showMembers} onClose={() => setShowMembers(null)} />}
    </div>
  );
};

const DAY_LABELS = { mon: "Måndag", tue: "Tisdag", wed: "Onsdag", thu: "Torsdag", fri: "Fredag", sat: "Lördag", sun: "Söndag" };

const ScheduleEditor = ({ schedule, mode = "edit", onSave, onClose }) => {
  const isCreate = mode === "create";
  const blank = { mon: "", tue: "", wed: "", thu: "", fri: "", sat: "", sun: "" };
  const initial = schedule || { name: "", lunch: 60, days: blank, count: 0 };
  const [form, setForm] = useState({
    name: initial.name,
    lunch: initial.lunch,
    days: { ...initial.days },
  });
  const [nameError, setNameError] = useState("");
  const setDay = (key, val) => setForm(f => ({ ...f, days: { ...f.days, [key]: val } }));

  const handleSave = () => {
    if (!form.name.trim()) {
      setNameError("Ange en benämning.");
      return;
    }
    onSave({ name: form.name.trim(), lunch: Number(form.lunch) || 0, days: form.days });
  };

  return (
    <div className="fixed inset-0 flex items-center justify-center fade-in"
      style={{ background: "rgba(15,17,18,0.55)", zIndex: 100, padding: 32 }}
      onClick={onClose}>
      <div className="rounded-xl overflow-hidden flex flex-col"
        style={{ background: "var(--bg)", width: 680, maxHeight: "90vh", boxShadow: "0 24px 60px rgba(0,0,0,0.3)" }}
        onClick={e => e.stopPropagation()}>
        <div className="px-6 py-4 flex items-center justify-between" style={{ borderBottom: "1px solid var(--line)", background: "white" }}>
          <div>
            <div className="eyebrow mb-0.5" style={{ color: "var(--green)" }}>
              {isCreate ? "Nytt arbetsschema" : "Redigera arbetsschema"}
            </div>
            <h2 className="font-display text-[17px] font-medium">
              {isCreate ? "Skapa schema" : schedule.name}
            </h2>
          </div>
          <button onClick={onClose} className="p-1.5 rounded-lg hover:bg-gray-100 transition" style={{ color: "var(--ink-3)" }}>
            <Icon name="x" size={16} />
          </button>
        </div>

        <div className="px-6 py-5 overflow-y-auto" style={{ flex: 1 }}>
          <WTField label="Benämning">
            <div className="flex flex-col gap-1 w-full">
              <SettingInput value={form.name}
                onChange={v => { setForm(f => ({ ...f, name: v })); setNameError(""); }}
                width="100%" />
              {nameError && (
                <span className="text-[11px]" style={{ color: "var(--rust)" }}>{nameError}</span>
              )}
            </div>
          </WTField>
          <WTField label="Lunchpaus">
            <SettingInput value={form.lunch} onChange={v => setForm(f => ({ ...f, lunch: v }))} suffix="minuter" width={120} type="number" />
          </WTField>

          <div className="text-[11px] uppercase tracking-wider font-medium mt-5 mb-2.5" style={{ color: "var(--ink-4)", letterSpacing: "0.06em" }}>Veckoschema</div>
          <div className="card px-5 py-1">
            {Object.entries(DAY_LABELS).map(([key, label], i, arr) => {
              const isWeekend = key === "sat" || key === "sun";
              const val = form.days[key];
              return (
                <div key={key} className="flex items-center gap-3 py-2"
                  style={{ borderBottom: i === arr.length - 1 ? "none" : "1px solid var(--line-2)" }}>
                  <div className="text-[12.5px] font-medium" style={{ width: 80, color: isWeekend ? "var(--ink-4)" : "var(--ink-2)" }}>{label}</div>
                  <input value={val} onChange={e => setDay(key, e.target.value)}
                    placeholder={isWeekend ? "Ledig" : "T.ex. 08:00–17:00"}
                    className="text-[12.5px] px-2.5 py-1.5 rounded-lg outline-none flex-1"
                    style={{ background: "white", border: "1px solid var(--line)", color: "var(--ink)" }} />
                  {val && (
                    <button onClick={() => setDay(key, "")}
                      className="p-1 rounded opacity-30 hover:opacity-100 transition"
                      title="Rensa">
                      <Icon name="x" size={12} />
                    </button>
                  )}
                </div>
              );
            })}
          </div>

          {!isCreate && (
            <div className="mt-4 px-4 py-2.5 rounded-lg flex items-center gap-2.5"
              style={{ background: "var(--bg-warm)", border: "1px solid var(--line)" }}>
              <Icon name="info" size={14} style={{ color: "var(--ink-3)" }} />
              <span className="text-[12px]" style={{ color: "var(--ink-2)" }}>
                Schemat används som standard för {schedule.count} anställda och påverkar deras tidsavstämning.
              </span>
            </div>
          )}
        </div>

        <div className="px-6 py-4 flex items-center justify-between" style={{ borderTop: "1px solid var(--line)", background: "white" }}>
          <button className="btn btn-ghost" style={{ opacity: 0.5 }}>Återställ</button>
          <div className="flex gap-2">
            <button onClick={onClose} className="btn btn-ghost">Avbryt</button>
            <button onClick={handleSave} className="btn btn-green">
              <Icon name="check2" size={13} /> {isCreate ? " Skapa schema" : " Spara schema"}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
};

          <WTField label="Benämning">
            <div className="flex flex-col gap-1 w-full">
              <SettingInput value={name}
                onChange={v => { setName(v); setNameError(""); }}
                width="100%" />
              {nameError && (
                <span className="text-[11px]" style={{ color: "var(--rust)" }}>{nameError}</span>
              )}
            </div>
          </WTField>
          <WTField label="Bas">
            <SettingSelect value={base}
              options={["Svenska helgdagar (standard)", "Inga helgdagar"]}
              onChange={setBase} width="100%" />
          </WTField>

          <div className="text-[11px] uppercase tracking-wider font-medium mt-5 mb-2.5" style={{ color: "var(--ink-4)", letterSpacing: "0.06em" }}>Räkna dessa som lediga dagar</div>
          <div className="card px-5 py-3 space-y-2.5">
            {Object.entries(EXTRA_LABELS).map(([key, label]) => (
              <SettingCheckbox key={key}
                checked={extras[key]}
                onChange={v => setExtras(e => ({ ...e, [key]: v }))}
                label={label} />
            ))}
          </div>
        </div>

        <div className="px-6 py-4 flex items-center justify-end gap-2" style={{ borderTop: "1px solid var(--line)", background: "white" }}>
          <button onClick={onClose} className="btn btn-ghost">Avbryt</button>
          <button onClick={handleSave} className="btn btn-green"><Icon name="check2" size={13} /> Skapa schema</button>
        </div>
      </div>
    </div>
  );
};

/* ================================================================
   CALENDAR — absence overview, click-to-edit per day & per employee
   ================================================================ */

const swedishMonths = ["januari","februari","mars","april","maj","juni","juli","augusti","september","oktober","november","december"];
const dayShort = ["m","t","o","t","f","l","s"]; // Mon–Sun (Swedish)

const Calendar = ({ openProfile }) => {
  const { employees, absences, addAbsence, updateAbsence, removeAbsence } = useEmployees();
  const [year, setYear] = useState(2026);
  const [month, setMonth] = useState(4); // 0-indexed: 4 = May
  const [deptFilter, setDeptFilter] = useState("Alla");
  const [typeFilter, setTypeFilter] = useState("Alla");
  const [search, setSearch] = useState("");
  const [quickPopup, setQuickPopup] = useState(null); // { employeeId, date }
  const [editAbsence, setEditAbsence] = useState(null);
  const [showAddModal, setShowAddModal] = useState(false);
  const [justSaved, setJustSaved] = useState(null);
  // Drag-to-select range
  const [dragSelection, setDragSelection] = useState(null); // { employeeId, employeeName, startDay, endDay }

  const flashSaved = (msg) => {
    setJustSaved(msg);
    setTimeout(() => setJustSaved(null), 2400);
  };

  // Helper: build a monthKey-formatted date string from a day number
  const formatDay = (d) => `${year}-${String(month + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;

  // Global mouseup ends the drag and opens the popup with the selected range
  React.useEffect(() => {
    if (!dragSelection) return;
    const handleUp = () => {
      const sel = dragSelection;
      if (!sel) return;
      const lo = Math.min(sel.startDay, sel.endDay);
      const hi = Math.max(sel.startDay, sel.endDay);
      setQuickPopup({
        employeeId: sel.employeeId,
        employeeName: sel.employeeName,
        date: formatDay(lo),
        endDate: formatDay(hi),
      });
      setDragSelection(null);
    };
    window.addEventListener("mouseup", handleUp);
    return () => window.removeEventListener("mouseup", handleUp);
  }, [dragSelection]);

  // Month grid
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  // Convert JS day (0=Sun) to Mon=0 for Swedish calendar
  const firstDow = (new Date(year, month, 1).getDay() + 6) % 7;
  const days = Array.from({ length: daysInMonth }, (_, i) => i + 1);

  const monthKey = (d) => `${year}-${String(month + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;

  const departments = ["Alla", ...new Set(employees.map(e => e.dept))];

  // Filter employees
  const filteredEmployees = employees.filter(e => {
    if (deptFilter !== "Alla" && e.dept !== deptFilter) return false;
    if (search && !e.name.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  // Filter absences in current month
  const monthStart = new Date(year, month, 1);
  const monthEnd = new Date(year, month, daysInMonth);
  const isInMonth = (abs) => {
    const start = new Date(abs.start);
    const end = new Date(abs.end);
    return end >= monthStart && start <= monthEnd;
  };
  const visibleAbsences = absences.filter(abs => {
    if (!isInMonth(abs)) return false;
    if (typeFilter !== "Alla" && abs.type !== typeFilter) return false;
    return true;
  });

  // Lookup: absences by employee + day
  const absenceFor = (empId, day) => {
    const date = new Date(year, month, day);
    return visibleAbsences.find(abs => {
      if (abs.employeeId !== empId) return false;
      const start = new Date(abs.start);
      const end = new Date(abs.end);
      // Strip time
      start.setHours(0,0,0,0); end.setHours(0,0,0,0); date.setHours(0,0,0,0);
      return date >= start && date <= end;
    });
  };

  // Position info for an absence in a given row (start day, end day, color)
  const getAbsenceMeta = (typeId) => ABSENCE_TYPES.find(t => t.id === typeId) || ABSENCE_TYPES[0];

  // Navigation
  const prevMonth = () => {
    if (month === 0) { setMonth(11); setYear(year - 1); }
    else setMonth(month - 1);
  };
  const nextMonth = () => {
    if (month === 11) { setMonth(0); setYear(year + 1); }
    else setMonth(month + 1);
  };

  // Stats for today
  const today = new Date();
  const todayKey = monthKey(today.getDate());
  const isCurrentMonth = today.getFullYear() === year && today.getMonth() === month;
  const todayAbsences = isCurrentMonth ? visibleAbsences.filter(abs => {
    const date = new Date(year, month, today.getDate());
    const start = new Date(abs.start); const end = new Date(abs.end);
    start.setHours(0,0,0,0); end.setHours(0,0,0,0); date.setHours(0,0,0,0);
    return date >= start && date <= end;
  }) : [];

  // Counts in current month
  const totalAbsenceDays = visibleAbsences.reduce((acc, abs) => {
    const start = new Date(Math.max(new Date(abs.start), monthStart));
    const end = new Date(Math.min(new Date(abs.end), monthEnd));
    const days = Math.floor((end - start) / 86400000) + 1;
    return acc + Math.max(0, days);
  }, 0);

  const isWeekend = (day) => {
    const dow = (new Date(year, month, day).getDay() + 6) % 7;
    return dow >= 5;
  };

  // Swedish holidays for May 2026 (Kristi himmelsfärd 14 maj)
  const holidays = {
    "2026-05-01": "Första maj",
    "2026-05-14": "Kristi himmelsfärd",
  };

  return (
    <div className="fade-in">
      <TopBar
        breadcrumb={["Tid & Frånvaro", "Kalender"]}
        title="Kalender"
        subtitle={`${swedishMonths[month]} ${year} · ${visibleAbsences.length} frånvaroposter · ${totalAbsenceDays} dagar`}
        actions={
          <>
            <button className="btn btn-ghost"><Icon name="download" size={13} /> Exportera</button>
            <button onClick={() => setShowAddModal(true)} className="btn btn-green">
              <Icon name="plus" size={13} /> Lägg till frånvaro
            </button>
          </>
        }
      />

      <div className="px-8 py-5">
        {justSaved && (
          <div className="fade-in mb-4 px-4 py-2.5 rounded-lg flex items-center gap-2.5"
            style={{ background: "var(--green-soft)", border: "1px solid var(--success)" }}>
            <Icon name="check2" size={14} strokeWidth={2.4} style={{ color: "var(--success-text)" }} />
            <span className="text-[12.5px]" style={{ color: "var(--success-text)" }}>{justSaved}</span>
          </div>
        )}

        {/* Top controls: month nav + filters + today indicator */}
        <div className="flex items-center gap-3 mb-4">
          <div className="flex items-center gap-1">
            <button onClick={prevMonth} className="p-1.5 rounded-lg transition"
              style={{ border: "1px solid var(--line)", background: "white", color: "var(--ink-2)" }}>
              <Icon name="chevL" size={14} />
            </button>
            <div className="font-display text-[16px] font-medium px-3 capitalize" style={{ minWidth: 180, textAlign: "center" }}>
              {swedishMonths[month]} <span className="num">{year}</span>
            </div>
            <button onClick={nextMonth} className="p-1.5 rounded-lg transition"
              style={{ border: "1px solid var(--line)", background: "white", color: "var(--ink-2)" }}>
              <Icon name="chevR" size={14} />
            </button>
            <button onClick={() => { setYear(today.getFullYear()); setMonth(today.getMonth()); }}
              className="text-[11.5px] px-2.5 py-1.5 rounded-lg transition ml-2"
              style={{ border: "1px solid var(--line)", background: "white", color: "var(--ink-2)" }}>
              Idag
            </button>
          </div>

          <div className="flex items-center gap-2 px-3 py-1.5 rounded-lg ml-3"
            style={{ background: "white", border: "1px solid var(--line)", maxWidth: 220 }}>
            <Icon name="search" size={13} style={{ color: "var(--ink-4)" }} />
            <input value={search} onChange={e => setSearch(e.target.value)}
              placeholder="Sök anställd"
              className="text-[12.5px] outline-none flex-1"
              style={{ background: "transparent", color: "var(--ink)" }} />
          </div>

          <SettingSelect value={deptFilter}
            options={departments}
            onChange={setDeptFilter} width={150} />
          <SettingSelect value={typeFilter}
            options={["Alla", ...ABSENCE_TYPES.map(t => t.label)]}
            onChange={(v) => {
              if (v === "Alla") setTypeFilter("Alla");
              else setTypeFilter(ABSENCE_TYPES.find(t => t.label === v)?.id || "Alla");
            }} width={170} />

          {isCurrentMonth && (
            <div className="ml-auto flex items-center gap-2 text-[12px]" style={{ color: "var(--ink-3)" }}>
              <Pill tone={todayAbsences.length > 5 ? "amber" : "neutral"} dot>{todayAbsences.length} frånvarande idag</Pill>
            </div>
          )}
        </div>

        {/* Legend */}
        <div className="flex items-center gap-3 mb-3 flex-wrap">
          {ABSENCE_TYPES.map(t => (
            <div key={t.id} className="flex items-center gap-1.5 text-[11.5px]" style={{ color: "var(--ink-3)" }}>
              <span style={{
                width: 18, height: 18, borderRadius: 4,
                background: t.color, color: "white",
                display: "inline-flex", alignItems: "center", justifyContent: "center",
              }}>
                <Icon name={t.icon} size={11} strokeWidth={2} />
              </span>
              {t.label}
            </div>
          ))}
        </div>

        {/* Calendar grid */}
        <div className="card overflow-hidden">
          {/* Header row with day numbers */}
          <div className="grid items-center"
            style={{
              gridTemplateColumns: `220px repeat(${daysInMonth}, minmax(28px, 1fr))`,
              borderBottom: "1px solid var(--line)",
              background: "var(--bg-warm)",
            }}>
            <div className="px-4 py-2.5 text-[10.5px] uppercase tracking-wider font-medium"
              style={{ color: "var(--ink-3)", letterSpacing: "0.06em" }}>Anställd</div>
            {days.map(d => {
              const isToday = isCurrentMonth && today.getDate() === d;
              const weekend = isWeekend(d);
              const dayKey = monthKey(d);
              const holiday = holidays[dayKey];
              const dow = (new Date(year, month, d).getDay() + 6) % 7;
              return (
                <div key={d} className="text-center py-1.5"
                  title={holiday || (weekend ? "Helgdag" : "")}
                  style={{
                    background: isToday ? "var(--ink)" : (holiday ? "rgba(155,34,34,0.06)" : "transparent"),
                    color: isToday ? "white" : (weekend || holiday ? "var(--ink-4)" : "var(--ink-3)"),
                    fontSize: 10,
                    fontWeight: isToday ? 600 : 500,
                  }}>
                  <div className="opacity-60 text-[8.5px] uppercase">{dayShort[dow]}</div>
                  <div className="num">{d}</div>
                </div>
              );
            })}
          </div>

          {/* Employee rows */}
          {filteredEmployees.length === 0 && (
            <div className="px-5 py-10 text-center text-[12.5px]" style={{ color: "var(--ink-4)" }}>
              Inga anställda matchar filtret.
            </div>
          )}
          {filteredEmployees.map((e, i) => {
            // Group this employee's absences that touch the current month into spanning bars
            const rowAbsences = visibleAbsences
              .filter(a => a.employeeId === e.id)
              .map(a => {
                const startDate = new Date(a.start);
                const endDate = new Date(a.end);
                // Clamp to current month
                const startDay = (startDate < monthStart) ? 1 : startDate.getDate();
                const endDay = (endDate > monthEnd) ? daysInMonth : endDate.getDate();
                return { ...a, startDay, endDay, startsBeforeMonth: startDate < monthStart, endsAfterMonth: endDate > monthEnd };
              });

            return (
              <div key={e.id} className="row-hover transition relative"
                style={{
                  borderBottom: i === filteredEmployees.length - 1 ? "none" : "1px solid var(--line-2)",
                }}>
                {/* Bottom layer: name cell + day cells in grid */}
                <div className="grid items-stretch"
                  style={{ gridTemplateColumns: `220px repeat(${daysInMonth}, minmax(28px, 1fr))` }}>
                  <button onClick={() => openProfile && openProfile(e.id)}
                    className="px-4 py-2 flex items-center gap-2.5 text-left hover:bg-white transition overflow-hidden"
                    style={{ borderRight: "1px solid var(--line-2)" }}>
                    <Avatar initials={e.initials} size={26} />
                    <div className="min-w-0 flex-1">
                      <div className="text-[12.5px] font-medium truncate">{e.name}</div>
                      <div className="text-[10.5px] truncate" style={{ color: "var(--ink-4)" }}>{e.dept}</div>
                    </div>
                  </button>
                  {days.map(d => {
                    const isToday = isCurrentMonth && today.getDate() === d;
                    const weekend = isWeekend(d);
                    const dayKey = monthKey(d);
                    const holiday = holidays[dayKey];
                    // Use opaque colors so hover on the row doesn't visually shift these cells
                    const baseBg = isToday ? "#E6EDED"
                      : holiday ? "#FBEAEA"
                      : weekend ? "var(--bg-warm)"
                      : "white";
                    return (
                      <button key={d}
                        onMouseDown={(ev) => {
                          ev.preventDefault();
                          ev.stopPropagation();
                          setDragSelection({ employeeId: e.id, employeeName: e.name, startDay: d, endDay: d });
                        }}
                        onMouseEnter={() => {
                          if (dragSelection && dragSelection.employeeId === e.id) {
                            setDragSelection({ ...dragSelection, endDay: d });
                          }
                        }}
                        className="transition cell-hover"
                        style={{
                          background: baseBg,
                          borderRight: "1px solid var(--line-2)",
                          minHeight: 36,
                          cursor: "pointer",
                          userSelect: "none",
                        }}>
                      </button>
                    );
                  })}
                </div>

                {/* Top layer: absorbing absence bars that span columns */}
                {rowAbsences.length > 0 && (
                  <div className="absolute inset-0 grid pointer-events-none"
                    style={{ gridTemplateColumns: `220px repeat(${daysInMonth}, minmax(28px, 1fr))` }}>
                    <div /> {/* skip name column */}
                    {rowAbsences.map(abs => {
                      const meta = getAbsenceMeta(abs.type);
                      // gridColumn: start through end (1-indexed in grid, +1 because name col is col 1, days start at col 2)
                      const colStart = abs.startDay + 1;
                      const colEnd = abs.endDay + 2; // grid end is exclusive
                      const span = abs.endDay - abs.startDay + 1;
                      const showLabel = span >= 3; // ≤2 days → icon only
                      // Highlight if recently arrived from Sphere (< 8s)
                      const fromSphere = abs.source === "sphere";
                      const justArrived = abs.arrivedAt && (Date.now() - abs.arrivedAt < 8000);
                      const isPending = abs.status === "vantar";
                      return (
                        <button key={abs.id}
                          onClick={(ev) => { ev.stopPropagation(); setEditAbsence(abs); }}
                          title={`${e.name} · ${meta.label}${abs.note ? " · " + abs.note : ""} · ${abs.start} → ${abs.end}${fromSphere ? " · Från Sphere" : ""}`}
                          className="relative transition pointer-events-auto flex items-center justify-center overflow-hidden gap-1.5"
                          style={{
                            gridColumn: `${colStart} / ${colEnd}`,
                            background: meta.color,
                            color: "white",
                            margin: "3px 1px",
                            borderRadius: 4,
                            borderTopLeftRadius: abs.startsBeforeMonth ? 0 : 4,
                            borderBottomLeftRadius: abs.startsBeforeMonth ? 0 : 4,
                            borderTopRightRadius: abs.endsAfterMonth ? 0 : 4,
                            borderBottomRightRadius: abs.endsAfterMonth ? 0 : 4,
                            cursor: "pointer",
                            fontSize: 10.5,
                            fontWeight: 500,
                            whiteSpace: "nowrap",
                            paddingLeft: showLabel ? 6 : 0,
                            paddingRight: showLabel ? 6 : 0,
                            opacity: isPending ? 0.65 : 1,
                            boxShadow: justArrived ? "0 0 0 2px var(--green-3), 0 0 0 4px rgba(97,188,143,0.3)" : "none",
                            animation: justArrived ? "spherePulse 1.4s ease-out 3" : "none",
                          }}
                          onMouseEnter={ev => { if (!justArrived) { ev.currentTarget.style.filter = "brightness(1.12)"; ev.currentTarget.style.boxShadow = "0 2px 6px rgba(0,0,0,0.18)"; } }}
                          onMouseLeave={ev => { if (!justArrived) { ev.currentTarget.style.filter = "none"; ev.currentTarget.style.boxShadow = "none"; } }}>
                          <Icon name={meta.icon} size={showLabel ? 11 : 13} strokeWidth={1.9} />
                          {showLabel && <span className="overflow-hidden text-ellipsis">{meta.label}</span>}
                          {isPending && showLabel && (
                            <span style={{
                              fontSize: 9, padding: "1px 5px", borderRadius: 99,
                              background: "rgba(255,255,255,0.25)", marginLeft: 2,
                            }}>Väntar</span>
                          )}
                        </button>
                      );
                    })}
                  </div>
                )}
                {/* Top layer: drag selection bar while user is dragging */}
                {dragSelection && dragSelection.employeeId === e.id && (() => {
                  const lo = Math.min(dragSelection.startDay, dragSelection.endDay);
                  const hi = Math.max(dragSelection.startDay, dragSelection.endDay);
                  return (
                    <div className="absolute inset-0 grid pointer-events-none"
                      style={{ gridTemplateColumns: `220px repeat(${daysInMonth}, minmax(28px, 1fr))` }}>
                      <div /> {/* skip name column */}
                      <div style={{
                        gridColumn: `${lo + 1} / ${hi + 2}`,
                        background: "rgba(12,77,51,0.18)",
                        border: "1.5px dashed var(--green)",
                        margin: "2px 1px",
                        borderRadius: 4,
                      }} />
                    </div>
                  );
                })()}
              </div>
            );
          })}
        </div>

        {/* Bottom hint */}
        <div className="mt-3 text-[11.5px] flex items-center gap-2" style={{ color: "var(--ink-4)" }}>
          <Icon name="info" size={11} />
          Klicka i en cell — eller klicka och dra för att markera en period · Klicka på ett färgat band för att redigera
        </div>
      </div>

      {quickPopup && (
        <QuickAbsencePopup
          employeeName={quickPopup.employeeName}
          employeeId={quickPopup.employeeId}
          date={quickPopup.date}
          endDate={quickPopup.endDate}
          onClose={() => setQuickPopup(null)}
          onSave={(payload) => {
            addAbsence(payload);
            setQuickPopup(null);
            flashSaved(`Frånvaro tillagd för ${quickPopup.employeeName}.`);
          }} />
      )}

      {editAbsence && (
        <AbsenceEditor
          mode="edit"
          absence={editAbsence}
          employees={employees}
          onClose={() => setEditAbsence(null)}
          onSave={(payload) => {
            updateAbsence(editAbsence.id, payload);
            setEditAbsence(null);
            flashSaved("Frånvaro uppdaterad.");
          }}
          onDelete={() => {
            removeAbsence(editAbsence.id);
            setEditAbsence(null);
            flashSaved("Frånvaro borttagen.");
          }} />
      )}

      {showAddModal && (
        <AbsenceEditor
          mode="create"
          employees={employees}
          defaultStart={monthKey(today.getDate() <= daysInMonth && isCurrentMonth ? today.getDate() : 1)}
          onClose={() => setShowAddModal(false)}
          onSave={(payload) => {
            addAbsence(payload);
            setShowAddModal(false);
            const emp = employees.find(e => e.id === payload.employeeId);
            flashSaved(`Frånvaro tillagd för ${emp ? emp.name : "anställd"}.`);
          }} />
      )}
    </div>
  );
};

/* ----------- Quick popup (click in empty cell) ----------- */
