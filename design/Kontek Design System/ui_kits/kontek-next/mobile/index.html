<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kontek Next — Mobil · navigationsmönster</title>
<link rel="stylesheet" href="../tokens.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { font-family: var(--font-ui); background: #f0eee9; -webkit-font-smoothing: antialiased; }
  #root { height: 100vh; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="android-frame.jsx"></script>
<script type="text/babel" src="m-icons.jsx"></script>
<script type="text/babel" src="m-screens.jsx"></script>
<script type="text/babel" src="m-apps.jsx"></script>
<script type="text/babel">
  // One brand-led design, three navigation patterns, shown on both an iOS and an
  // Android device frame — proving the system is genuinely cross-platform.
  // Tap around: tabs, drawer, the centre create button and the "Mer" sheet are live.
  function AndroidShell({ children }) {
    // AndroidDevice supplies its own in-flow status bar + gesture nav, so the app
    // shell uses a small top inset (14) instead of the iOS overlay inset (56).
    return <AndroidDevice width={412} height={892}>{children}</AndroidDevice>;
  }

  function MobileLibrary() {
    return (
      <DesignCanvas>
        <DCSection id="ios" title="iPhone" subtitle="Tre navigationsmönster på samma ytor (Översikt · Lön · Time). Tryck runt — flikar, meny och blad är klickbara.">
          <DCArtboard id="ios-tab" label="A · Bottenflikar (tab bar)" width={402} height={874}>
            <IOSDevice><MTabBarApp /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="ios-drawer" label="B · Hamburgermeny (drawer)" width={402} height={874}>
            <IOSDevice><MDrawerApp /></IOSDevice>
          </DCArtboard>
          <DCArtboard id="ios-hybrid" label="C · Hybrid (flikar + skapa-knapp)" width={402} height={874}>
            <IOSDevice><MHybridApp /></IOSDevice>
          </DCArtboard>
        </DCSection>

        <DCSection id="android" title="Android" subtitle="Identisk varumärkesdesign i en Material-ram — samma komponenter, samma känsla, inget plattformsspecifikt utseende.">
          <DCArtboard id="and-tab" label="A · Bottenflikar (tab bar)" width={412} height={892}>
            <AndroidShell><MTabBarApp topInset={14} /></AndroidShell>
          </DCArtboard>
          <DCArtboard id="and-drawer" label="B · Hamburgermeny (drawer)" width={412} height={892}>
            <AndroidShell><MDrawerApp topInset={14} /></AndroidShell>
          </DCArtboard>
          <DCArtboard id="and-hybrid" label="C · Hybrid (flikar + skapa-knapp)" width={412} height={892}>
            <AndroidShell><MHybridApp topInset={14} /></AndroidShell>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<MobileLibrary />);
</script>
</body>
</html>
