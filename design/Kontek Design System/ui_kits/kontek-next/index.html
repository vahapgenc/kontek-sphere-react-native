<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kontek Next — Översikt</title>
<!-- Frozen token snapshot — the Dashboard is intentionally pinned to the
     original palette and does NOT follow the design-system recolor. -->
<link rel="stylesheet" href="tokens.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { font-family: var(--font-ui); background: var(--canvas); color: var(--ink); -webkit-font-smoothing: antialiased; }
  #root { height: 100vh; }
  ::selection { background: var(--green-soft); }
  input::placeholder { color: var(--ink-3); }
  /* dark shell frame — kept dark; the green now lives entirely in the sidebar,
     glowing up from its lower portion (see Sidebar.jsx) */
  .kn-shell { background: var(--shell-bg); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="sidebar.jsx"></script>
<script type="text/babel" src="topbar.jsx"></script>
<script type="text/babel" src="dashboard.jsx"></script>
<script type="text/babel">
  const { useState } = React;

  function App() {
    const [active, setActive] = useState('overview');
    const [collapsed, setCollapsed] = useState(false);
    return (
      <div className="kn-shell" style={{ display: 'flex', height: '100vh', overflow: 'hidden' }} data-screen-label="Översikt">
        <Sidebar active={active} setActive={setActive} collapsed={collapsed} onToggle={() => setCollapsed(c => !c)} />
        <main style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0, overflow: 'hidden' }}>
          <div style={{
            flex: 1, minHeight: 0, margin: 'var(--shell-gap) var(--shell-gap) var(--shell-gap) 0',
            background: '#FFFFFF', borderRadius: 'var(--r-shell-panel)',
            boxShadow: 'var(--elev-float)', overflow: 'hidden',
            display: 'flex', flexDirection: 'column',
          }}>
            <Topbar />
            <div style={{ flex: 1, minHeight: 0, overflowY: 'auto' }}>
              <Dashboard />
            </div>
          </div>
        </main>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
